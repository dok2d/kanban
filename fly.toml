# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "kanban-demo"
primary_region = "ams"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[processes]
  app = "-addr :8080 -db /data/kanban.db -demo"

[mounts]
  source = "kanban_data"
  destination = "/data"
