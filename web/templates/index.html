<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanban</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/css/fonts.css">
<link rel="stylesheet" href="/static/css/atom-one-dark.min.css">
<script src="/static/js/marked.min.js"></script>
<script src="/static/js/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* === Theme variables === */
:root, [data-theme="dark"]{
  --bg:#0f1117;--bg2:#181a24;--bg3:#1e2030;--bg4:#262840;
  --fg:#c8cad8;--fg2:#8b8fa8;--fg3:#5c6078;
  --accent:#7c6ff7;--accent2:#a78bfa;
  --red:#ef4444;--orange:#f59e0b;--green:#22c55e;--blue:#3b82f6;
  --radius:6px;--radius-lg:10px;
  --shadow:0 2px 8px rgba(0,0,0,.3);
  --col-w:300px;
  --font-size:14px;
}
[data-theme="light"]{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#eef0f4;--bg4:#d8dbe5;
  --fg:#1a1a2e;--fg2:#4a4e69;--fg3:#8b8fa8;
  --accent:#6c5ce7;--accent2:#5b4cdb;
  --red:#dc2626;--orange:#d97706;--green:#16a34a;--blue:#2563eb;
  --shadow:0 2px 8px rgba(0,0,0,.1);
}
[data-theme="ocean"]{
  --bg:#0b1622;--bg2:#101d2e;--bg3:#162435;--bg4:#1e3148;
  --fg:#c4d4e0;--fg2:#7f99b0;--fg3:#506882;
  --accent:#0ea5e9;--accent2:#38bdf8;
  --red:#f43f5e;--orange:#fb923c;--green:#34d399;--blue:#60a5fa;
  --shadow:0 2px 8px rgba(0,0,0,.4);
}
[data-theme="forest"]{
  --bg:#0f1a0f;--bg2:#162016;--bg3:#1c2b1c;--bg4:#2a3f2a;
  --fg:#c4d8c4;--fg2:#88a888;--fg3:#5c7a5c;
  --accent:#22c55e;--accent2:#4ade80;
  --red:#ef4444;--orange:#f59e0b;--green:#22c55e;--blue:#60a5fa;
  --shadow:0 2px 8px rgba(0,0,0,.35);
}
[data-theme="nord"]{
  --bg:#2e3440;--bg2:#3b4252;--bg3:#434c5e;--bg4:#4c566a;
  --fg:#eceff4;--fg2:#d8dee9;--fg3:#8892a6;
  --accent:#88c0d0;--accent2:#81a1c1;
  --red:#bf616a;--orange:#d08770;--green:#a3be8c;--blue:#5e81ac;
  --shadow:0 2px 8px rgba(0,0,0,.3);
}
[data-theme="dracula"]{
  --bg:#282a36;--bg2:#21222c;--bg3:#313545;--bg4:#44475a;
  --fg:#f8f8f2;--fg2:#bfc1d4;--fg3:#6272a4;
  --accent:#bd93f9;--accent2:#ff79c6;
  --red:#ff5555;--orange:#ffb86c;--green:#50fa7b;--blue:#8be9fd;
  --shadow:0 2px 8px rgba(0,0,0,.35);
}
[data-theme="solarized"]{
  --bg:#fdf6e3;--bg2:#eee8d5;--bg3:#e8e1ca;--bg4:#d6cdb5;
  --fg:#586e75;--fg2:#657b83;--fg3:#93a1a1;
  --accent:#268bd2;--accent2:#2aa198;
  --red:#dc322f;--orange:#cb4b16;--green:#859900;--blue:#268bd2;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}
[data-theme="spacedust"]{
  --bg:#0a0e14;--bg2:#131920;--bg3:#1a222c;--bg4:#253040;
  --fg:#dfd5c1;--fg2:#b0a890;--fg3:#6e6b5e;
  --accent:#e7a84f;--accent2:#e35b00;
  --red:#e24c49;--orange:#e7a84f;--green:#5cab7d;--blue:#6e98a4;
  --shadow:0 2px 8px rgba(0,0,0,.4);
}

html{font-size:var(--font-size)}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
a{color:var(--accent2);text-decoration:none}

.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bg4);position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
.header h1{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--accent2);letter-spacing:-.02em}
.header h1 a{color:inherit;text-decoration:none}
.header-actions{display:flex;gap:8px;align-items:center}
.header-spacer{height:52px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--bg4)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-danger{background:transparent;color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.15)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-icon{padding:4px 8px;background:transparent;border:none;color:var(--fg3);cursor:pointer;border-radius:var(--radius)}
.btn-icon:hover{color:var(--fg);background:var(--bg4)}

.board{display:flex;gap:16px;padding:20px 24px;min-height:calc(100vh - 52px);align-items:flex-start;overflow-x:auto}
.column{background:var(--bg2);border-radius:var(--radius-lg);width:var(--col-w);min-width:var(--col-w);flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 90px)}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--bg3)}
.col-title{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px}
.col-count{background:var(--bg4);color:var(--fg2);font-size:.75rem;padding:1px 7px;border-radius:10px;font-weight:600}
.col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.card{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;cursor:grab;border:1px solid transparent;transition:all .15s;position:relative}
.card:hover{border-color:var(--bg4);box-shadow:var(--shadow)}
.card.dragging{opacity:.5;border-color:var(--accent)}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:4px;line-height:1.3}
.card-id{font-size:.7rem;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:6px}
.card-epic{font-size:.72rem;padding:2px 8px;border-radius:10px;font-weight:600;cursor:pointer}
.card-tag{font-size:.7rem;padding:1px 7px;border-radius:8px;font-weight:600;opacity:.85}
.card-priority{width:3px;height:100%;position:absolute;left:0;top:0;border-radius:var(--radius) 0 0 var(--radius)}
.priority-1{background:var(--blue)}
.priority-2{background:var(--green)}
.priority-3{background:var(--orange)}
.priority-4{background:var(--red)}
.card-comments{font-size:.75rem;color:var(--fg3);display:flex;align-items:center;gap:3px}
.card-todo{font-size:.72rem;color:var(--fg3);display:flex;align-items:center;gap:3px}
.card-link{font-size:.72rem;color:var(--accent2);display:flex;align-items:center;gap:2px}
.card-assignee{font-size:.72rem;color:var(--accent2);display:flex;align-items:center;gap:2px;background:var(--bg4);padding:1px 6px;border-radius:8px}
.card-private{font-size:.72rem;color:var(--orange);display:flex;align-items:center;gap:2px}
.drop-zone{min-height:40px;border:2px dashed var(--bg4);border-radius:var(--radius);margin:4px 0;transition:all .15s}
.drop-zone.over{border-color:var(--accent);background:rgba(124,111,247,.08)}
.add-task-btn{width:100%;padding:8px;background:transparent;border:1px dashed var(--bg4);border-radius:var(--radius);color:var(--fg3);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .15s;margin-top:4px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent2)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--radius-lg);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bg3)}
.modal-header h2{font-size:1rem}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--bg3)}

.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
.lightbox-overlay img{max-width:calc(100vw - 40px);max-height:calc(100vh - 40px);object-fit:contain;border-radius:var(--radius-lg);box-shadow:0 4px 30px rgba(0,0,0,.6)}

.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8rem;color:var(--fg2);font-weight:600}
.field input,.field textarea,.field select{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:8px 10px;color:var(--fg);font-family:inherit;font-size:.88rem;outline:none;transition:border .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.field select{cursor:pointer}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:.78rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;opacity:.6}
.chip.selected{opacity:1;border-color:#fff3}
.chip:hover{opacity:.9}

.md-toolbar{display:flex;gap:2px;padding:4px;background:var(--bg4);border-radius:var(--radius) var(--radius) 0 0;flex-wrap:wrap}
.md-toolbar button{background:transparent;border:none;color:var(--fg2);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:.78rem;font-family:'JetBrains Mono',monospace;font-weight:600;transition:all .1s}
.md-toolbar button:hover{background:var(--accent);color:#fff}
.md-toolbar+textarea{border-radius:0 0 var(--radius) var(--radius)!important}

.md-content{font-size:.9rem;line-height:1.6;color:var(--fg2);padding:10px 14px;background:var(--bg3);border-radius:var(--radius);min-height:40px;overflow-wrap:break-word}
.md-content:empty::before{content:attr(data-empty);color:var(--fg3)}
.md-content h1,.md-content h2,.md-content h3{color:var(--fg);margin:8px 0 4px;font-size:1rem}
.md-content h1{font-size:1.15rem}
.md-content h2{font-size:1.05rem}
.md-content p{margin:4px 0}
.md-content ul,.md-content ol{margin:4px 0 4px 20px}
.md-content li{margin:2px 0}
.md-content code{background:var(--bg4);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.md-content pre{background:var(--bg4);padding:10px;border-radius:var(--radius);overflow-x:auto;margin:6px 0}
.md-content pre code{background:none;padding:0}
.md-content img{max-width:100%;border-radius:var(--radius);margin:6px 0;cursor:zoom-in}
.md-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--fg3);margin:6px 0}
.md-content input[type="checkbox"]{margin-right:6px;accent-color:var(--accent);cursor:pointer}
.md-content a{color:var(--accent2)}
.md-content details{background:var(--bg4);border-radius:var(--radius);padding:8px 12px;margin:6px 0}
.md-content details summary{cursor:pointer;font-weight:600;color:var(--fg);user-select:none}
.md-content details summary:hover{color:var(--accent2)}

/* mention highlighting */
.mention{color:var(--accent2);font-weight:600;cursor:pointer}

.task-page{max-width:800px;margin:0 auto;padding:30px 24px}
.task-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.task-page-header h2{font-size:1.3rem;display:flex;align-items:center;gap:10px}
.task-page-header .task-id-badge{font-size:.85rem;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.task-page-body{display:flex;flex-direction:column;gap:16px}
.task-page-sidebar-info{display:flex;flex-wrap:wrap;gap:12px;padding:14px;background:var(--bg2);border-radius:var(--radius-lg);margin-bottom:8px}
.task-info-item{display:flex;flex-direction:column;gap:3px;min-width:120px}
.task-info-item label{font-size:.72rem;color:var(--fg3);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.task-info-item .value{font-size:.88rem;color:var(--fg)}
.task-page-section{background:var(--bg2);border-radius:var(--radius-lg);padding:16px 20px}
.task-page-section h3{font-size:.9rem;margin-bottom:10px;color:var(--fg2)}
.task-dates{font-size:.72rem;color:var(--fg3);display:flex;gap:16px}

.todo-list{display:flex;flex-direction:column;gap:4px}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius);transition:all .15s}
.todo-item:hover{background:var(--bg4)}
.todo-item input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;width:16px;height:16px;flex-shrink:0}
.todo-item .todo-text{flex:1;font-size:.88rem}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--fg3)}
.todo-item .btn-icon{opacity:0;transition:opacity .15s}
.todo-item:hover .btn-icon{opacity:1}
.todo-add{display:flex;gap:6px;margin-top:6px}
.todo-add input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 10px;color:var(--fg);font-family:inherit;font-size:.85rem;outline:none}
.todo-add input:focus{border-color:var(--accent)}

.epic-page{max-width:900px;margin:0 auto;padding:30px 24px}
.epic-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.epic-page-header h2{font-size:1.3rem;display:flex;align-items:center;gap:10px}
.epic-task-list{display:flex;flex-direction:column;gap:6px}
.epic-task-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.epic-task-row:hover{background:var(--bg4)}
.epic-task-status{padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600;background:var(--bg4);color:var(--fg2)}
.epic-task-title{flex:1;font-size:.9rem;font-weight:600}
.epic-task-prio{font-size:.75rem;font-weight:600}

.search-input{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 10px;color:var(--fg);font-family:inherit;font-size:.85rem;outline:none;width:240px;transition:border .15s}
.search-input:focus{border-color:var(--accent);width:300px}
.search-results{position:fixed;top:52px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--bg4);padding:12px 24px;max-height:60vh;overflow-y:auto;box-shadow:var(--shadow)}
.search-result-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius);cursor:pointer;margin-bottom:4px;transition:all .15s}
.search-result-item:hover{background:var(--bg4)}

.sidebar{position:fixed;right:0;top:52px;width:360px;height:calc(100vh - 52px);background:var(--bg2);border-left:1px solid var(--bg4);z-index:150;transform:translateX(100%);transition:transform .25s;padding:20px;overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sidebar h3{font-size:.95rem;margin-bottom:12px}
.sidebar-section{margin-bottom:24px}
.entity-list{display:flex;flex-direction:column;gap:6px}
.entity-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.entity-item .dot{width:12px;height:12px;max-width:12px;min-width:12px;min-height:12px;border-radius:50%;margin-right:8px;flex-shrink:0}
.entity-item span{flex:1;font-size:.85rem;min-width:0;overflow:hidden;text-overflow:ellipsis}
.entity-add{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.entity-add input{flex:1;min-width:60px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:inherit;font-size:.82rem;outline:none}
.entity-add input[type="color"]{width:36px;padding:2px;cursor:pointer;flex:none;min-width:36px}

.col-order-item{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.col-order-item span{flex:1;font-size:.85rem}
.col-order-btns{display:flex;gap:2px}
.col-order-btns button{background:transparent;border:none;color:var(--fg3);cursor:pointer;padding:2px 6px;border-radius:3px;font-size:.85rem}
.col-order-btns button:hover{background:var(--bg4);color:var(--fg)}

.epic-progress{margin-top:4px}
.epic-progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}
.epic-progress-fill{height:100%;border-radius:2px;transition:width .3s}
.epic-progress-text{font-size:.7rem;color:var(--fg3)}

.theme-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.theme-btn{padding:6px 14px;border-radius:var(--radius);border:2px solid var(--bg4);background:var(--bg3);color:var(--fg);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}

.font-size-ctrl{display:flex;align-items:center;gap:8px;margin-top:4px}
.font-size-ctrl button{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--bg4);background:var(--bg3);color:var(--fg);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.font-size-ctrl button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.font-size-ctrl span{font-size:.85rem;color:var(--fg2);min-width:40px;text-align:center}

.project-link{display:inline-flex;align-items:center;gap:4px;font-size:.82rem;color:var(--accent2);padding:4px 10px;background:var(--bg3);border-radius:var(--radius);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.comment-form{display:flex;flex-direction:column;gap:8px}
.comment-form textarea{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:8px 10px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:.82rem;outline:none;resize:vertical;min-height:60px}
.comment-form textarea:focus{border-color:var(--accent)}
.comment-form-actions{display:flex;justify-content:space-between;align-items:center}
.paste-hint{font-size:.72rem;color:var(--fg3)}
.comments-list{display:flex;flex-direction:column;gap:8px}
.comment{background:var(--bg3);border-radius:var(--radius);padding:10px 12px}
.comment-author{font-size:.78rem;color:var(--accent2);font-weight:600;margin-bottom:4px}
.comment-text{font-size:.88rem;line-height:1.5}
.comment-text .md-content{padding:0;background:none;min-height:auto}
.comment-time{font-size:.72rem;color:var(--fg3);margin-top:4px;display:flex;justify-content:space-between;align-items:center}

.comment-replies{margin-left:20px;border-left:2px solid var(--bg4);padding-left:12px;display:flex;flex-direction:column;gap:6px;margin-top:6px}
.comment-actions{display:flex;gap:6px;align-items:center}
.comment-actions button{background:transparent;border:none;color:var(--fg3);cursor:pointer;font-size:.72rem;padding:2px 6px;border-radius:3px;font-family:inherit}
.comment-actions button:hover{color:var(--accent2);background:var(--bg4)}
.reply-form{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.reply-form textarea{background:var(--bg);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none;resize:vertical;min-height:50px}
.reply-form textarea:focus{border-color:var(--accent)}
.comment-edited{font-size:.68rem;color:var(--fg3);font-style:italic;cursor:help}

.export-import-btns{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.tz-select{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:inherit;font-size:.82rem;outline:none;width:100%;margin-top:4px}
.tz-select:focus{border-color:var(--accent)}

/* Notification badge */
.notif-badge{background:var(--red);color:#fff;font-size:.7rem;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:4px}
.notif-dropdown{position:fixed;right:20px;top:52px;width:380px;max-height:60vh;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);box-shadow:var(--shadow);z-index:200;overflow-y:auto;padding:12px}
.notif-item{padding:8px 10px;background:var(--bg3);border-radius:var(--radius);margin-bottom:6px;font-size:.82rem;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.notif-item.unread{border-left-color:var(--accent)}
.notif-item:hover{background:var(--bg4)}
.notif-time{font-size:.7rem;color:var(--fg3);margin-top:4px}

/* User profile page */
.user-page{max-width:800px;margin:0 auto;padding:30px 24px}
.user-page-header{margin-bottom:20px}
.user-page-header h2{font-size:1.3rem}
.activity-list{display:flex;flex-direction:column;gap:6px}
.activity-item{padding:8px 12px;background:var(--bg3);border-radius:var(--radius);font-size:.85rem;display:flex;gap:10px;align-items:center}
.activity-time{font-size:.72rem;color:var(--fg3);white-space:nowrap}
.activity-action{flex:1}

/* Language selector */
.lang-select{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:inherit;font-size:.82rem;outline:none;width:100%;margin-top:4px}

@media(max-width:768px){
  .header{padding:8px 12px;height:48px}
  .header h1{font-size:.95rem}
  .header-spacer{height:48px}
  .search-input{width:140px;font-size:.8rem}
  .search-input:focus{width:180px}
  .board{padding:12px;gap:12px;flex-direction:column;align-items:stretch}
  .column{width:100%;min-width:unset;max-height:none}
  .col-body{max-height:50vh}
  .sidebar{width:100%;right:0;left:0}
  .modal{width:98vw;max-width:98vw}
  .task-page,.epic-page,.user-page{padding:16px 12px}
  .task-page-header h2,.epic-page-header h2{font-size:1.1rem}
  .task-page-sidebar-info{flex-direction:column}
  .field-row{flex-direction:column}
  .search-results{padding:8px 12px}
  .lightbox-overlay{padding:8px}
  .lightbox-overlay img{max-width:calc(100vw - 16px);max-height:calc(100vh - 16px)}
  .comment-replies{margin-left:12px;padding-left:8px}
  .epic-page-header{flex-direction:column;align-items:flex-start}
  .task-page-header{flex-direction:column;align-items:flex-start}
  .theme-list{gap:6px}
  .theme-btn{padding:4px 10px;font-size:.78rem}
  .md-toolbar{gap:1px}
  .md-toolbar button{padding:3px 5px;font-size:.72rem}
  .notif-dropdown{width:calc(100vw - 20px);right:10px}
}
@media(max-width:480px){
  .header-actions{gap:4px}
  .search-input{width:100px}
  .search-input:focus{width:140px}
  .card-meta{gap:3px}
  .btn-sm{padding:3px 8px;font-size:.75rem}
  .col-body{max-height:40vh}
}
.card-deadline{width:8px;height:8px;border-radius:50%;background:var(--fg3);display:inline-block;cursor:help;position:relative;flex-shrink:0}
.card-deadline.soon{background:var(--orange)}
.card-deadline.overdue{background:var(--red)}
.deadline-popup{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 10px;font-size:.75rem;color:var(--fg);white-space:nowrap;z-index:50;box-shadow:var(--shadow);pointer-events:none;opacity:0;transition:opacity .15s}
.card-deadline:hover .deadline-popup{opacity:1}
.dep-search-wrap{position:relative}
.dep-search-input{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:inherit;font-size:.85rem;outline:none}
.dep-search-input:focus{border-color:var(--accent)}
.dep-list{max-height:120px;overflow-y:auto;border:1px solid var(--bg4);border-radius:var(--radius);background:var(--bg3);margin-top:4px}
.dep-list-item{padding:4px 8px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.dep-list-item:hover{background:var(--bg4)}
.dep-list-item input{accent-color:var(--accent)}
.dep-selected{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dep-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--bg4);border-radius:10px;font-size:.78rem;color:var(--fg2)}
.dep-chip button{background:none;border:none;color:var(--fg3);cursor:pointer;font-size:.75rem;padding:0 2px}
.dep-chip button:hover{color:var(--red)}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1><a href="/" onclick="navigateTo('/');return false;">&#x2B21; kanban</a></h1>
  <div class="header-actions">
    <input class="search-input" id="search" autocomplete="off">
    <button class="btn btn-ghost btn-sm" id="notif-btn" onclick="toggleNotifications()" style="position:relative">&#128276;<span id="notif-count" class="notif-badge hidden">0</span></button>
    <button class="btn btn-ghost btn-sm" id="personal-toggle" onclick="togglePersonalView()" style="display:none"></button>
    <button class="btn btn-ghost btn-sm" onclick="toggleSidebar()">&#9881;</button>
  </div>
</div>
<div class="header-spacer"></div>
<div id="notif-dropdown" class="notif-dropdown hidden"></div>
<div id="search-results" class="search-results hidden"></div>
<div id="app"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <h3 data-i18n="theme"></h3>
    <div class="theme-list" id="theme-list">
      <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">&#9790;</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')">&#9788;</button>
      <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')">Ocean</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Forest</button>
      <button class="theme-btn" data-theme="nord" onclick="setTheme('nord')">Nord</button>
      <button class="theme-btn" data-theme="dracula" onclick="setTheme('dracula')">Dracula</button>
      <button class="theme-btn" data-theme="solarized" onclick="setTheme('solarized')">Solarized</button>
      <button class="theme-btn" data-theme="spacedust" onclick="setTheme('spacedust')">Spacedust</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3 data-i18n="language"></h3>
    <select class="lang-select" id="lang-select" onchange="setLang(this.value)"></select>
  </div>
  <div class="sidebar-section">
    <h3 data-i18n="fontSize"></h3>
    <div class="font-size-ctrl">
      <button onclick="changeFontSize(-1)">-</button>
      <span id="font-size-label">14px</span>
      <button onclick="changeFontSize(1)">+</button>
    </div>
  </div>
  <div class="sidebar-section" id="columns-section" style="display:none">
    <h3 data-i18n="columns"></h3>
    <div class="entity-list" id="col-order-list"></div>
    <div class="entity-add" style="margin-top:8px">
      <input type="text" id="new-col-name" onkeydown="if(event.key==='Enter')addColumn()">
      <button class="btn btn-primary btn-sm" onclick="addColumn()">+</button>
    </div>
  </div>
  <div class="sidebar-section" id="epics-section">
    <h3 data-i18n="epics"></h3>
    <div class="entity-list" id="epic-list"></div>
    <div class="entity-add" id="epic-add-form" style="display:none">
      <input type="color" id="epic-color" value="#6366f1">
      <input type="text" id="epic-name" onkeydown="if(event.key==='Enter')addEpic()">
      <button class="btn btn-primary btn-sm" onclick="addEpic()">+</button>
    </div>
  </div>
  <div class="sidebar-section" id="tags-section">
    <h3 data-i18n="tags"></h3>
    <div class="entity-list" id="tag-list"></div>
    <div class="entity-add" id="tag-add-form" style="display:none">
      <input type="color" id="tag-color" value="#64748b">
      <input type="text" id="tag-name" onkeydown="if(event.key==='Enter')addTag()">
      <button class="btn btn-primary btn-sm" onclick="addTag()">+</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3 data-i18n="timezone"></h3>
    <select class="tz-select" id="tz-select" onchange="setTimezone(this.value)"></select>
  </div>
  <div class="sidebar-section">
    <h3 data-i18n="exportImport"></h3>
    <div class="export-import-btns">
      <button class="btn btn-ghost btn-sm" onclick="exportBoard()">&#128229; Export JSON</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-file').click()">&#128228; Import JSON</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBoard(this)">
    </div>
  </div>
  <div class="sidebar-section" id="telegram-section" style="display:none">
    <h3>Telegram</h3>
    <div id="telegram-content"></div>
  </div>
  <div class="sidebar-section" id="users-section" style="display:none">
    <h3 data-i18n="users"></h3>
    <div class="entity-list" id="user-list"></div>
    <div class="entity-add" id="add-user-form">
      <input type="text" id="new-user-name" style="min-width:70px">
      <input type="password" id="new-user-pass" style="min-width:70px">
      <select id="new-user-role" style="min-width:70px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 4px;color:var(--fg);font-size:.82rem">
        <option value="regular" data-i18n-value="regular"></option>
        <option value="readonly" data-i18n-value="readonly"></option>
        <option value="admin" data-i18n-value="admin"></option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="addUser()">+</button>
    </div>
  </div>
  <div class="sidebar-section">
    <div style="display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap">
      <span id="current-user-label" style="font-size:.82rem;color:var(--fg2);cursor:pointer" onclick="if(currentUser)navigateTo('/user/'+currentUser.id)"></span>
      <div style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-sm" onclick="changeOwnPassword()" data-i18n="changePassword"></button>
        <button class="btn btn-ghost btn-sm" onclick="logout()" data-i18n="logout"></button>
      </div>
    </div>
  </div>
</div>

// === Utils ===
function contrastColor(hex) {
  if (!hex || hex[0] !== '#') return '#fff';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.55 ? '#1a1a2e' : '#ffffff';
}
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return esc(s); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  const tz = getTimezone();
  try { return d.toLocaleDateString('ru-RU', {timeZone: tz}) + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit', timeZone: tz}); }
  catch { return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}); }
}
function autoPrefix(url) {
  if (!url) return url;
  url = url.trim();
  if (url && !/^https?:\/\//i.test(url) && /^[a-zA-Z0-9]/.test(url) && url.includes('.')) return 'https://' + url;
  return url;
}

// === Markdown ===
function initMarked() {
  if (typeof marked === 'undefined') return;
  marked.setOptions({ breaks: true, gfm: true });
}
initMarked();

function renderMd(text) {
  if (!text) return '';
  if (typeof marked === 'undefined') return esc(text);
  try {
    let processed = text.replace(/<details><summary>(.*?)<\/summary>\n?([\s\S]*?)\n?<\/details>/g,
      function(_, summary, body) { return `<details><summary>${summary}</summary>\n${marked.parse(body.trim())}</details>`; });
    // Highlight @mentions
    processed = processed.replace(/@(\w+)/g, '<span class="mention" onclick="navigateTo(\'/user/\'+getUserIdByName(\'$1\'))">@$1</span>');
    let html = marked.parse(processed);
    html = html.replace(/<p>\s*<details>/g, '<details>').replace(/<\/details>\s*<\/p>/g, '</details>');
    html = html.replace(/<a\s+href="(?!https?:\/\/|\/|#|mailto:)([^"]+\.[^"]+)"/g, '<a href="https://$1"');
    html = html.replace(/<a\s+href="(https?:\/\/[^"]+)"/g, '<a href="$1" target="_blank" rel="noopener"');
    return html;
  } catch { return esc(text); }
}

function getUserIdByName(name) {
  const u = (state.users || []).find(u => u.username === name);
  return u ? u.id : 0;
}

function countTodos(text) {
  if (!text) return null;
  const all = (text.match(/- \[[ x]\]/gi) || []);
  if (all.length === 0) return null;
  const done = (text.match(/- \[x\]/gi) || []).length;
  return { done, total: all.length };
}
function parseTodoItems(text) {
  if (!text) return [];
  return text.split('\n').filter(l => /^- \[[ x]\]/i.test(l.trim())).map(l => {
    const done = /^- \[x\]/i.test(l.trim());
    const label = l.trim().replace(/^- \[[ x]\]\s*/i, '');
    return { done, label };
  });
}
function todoItemsToText(items) { return items.map(i => `- [${i.done ? 'x' : ' '}] ${i.label}`).join('\n'); }

function epicProgress(epicId) {
  const epicTasks = state.tasks.filter(t => t.epic_id === epicId && !t.is_personal);
  if (epicTasks.length === 0) return { total: 0, done: 0, pct: 0 };
  const lastCol = state.columns.length ? state.columns[state.columns.length - 1] : null;
  const done = lastCol ? epicTasks.filter(t => t.column_id === lastCol.id).length : 0;
  return { total: epicTasks.length, done, pct: Math.round(done / epicTasks.length * 100) };
}

// === API ===
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

  if (!state.epics) state.epics = [];
  if (!state.tags) state.tags = [];
  if (!state.users) state.users = [];
  renderCurrentView();
}

// === Image paste ===
async function uploadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try { const res = await api('/api/images', 'POST', { data: base64, mime: file.type }); resolve(res.url); }
      catch (e) { reject(e); }
    };
    reader.readAsDataURL(file);
  });
}
function setupPaste(textarea) {
  textarea.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        const pos = textarea.selectionStart;
        const before = textarea.value.substring(0, pos);
        const after = textarea.value.substring(textarea.selectionEnd);
        textarea.value = before + `![${t('uploading')}]()` + after;
        try { const url = await uploadImage(file); textarea.value = before + `![image](${url})` + after; }
        catch { textarea.value = before + `![${t('uploadFailed')}]()` + after; }
        break;
      }
    }
  });
}

function mdInsert(id, before, after) {
  const ta = document.getElementById(id);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd, sel = ta.value.substring(start, end);
  const b = before.replace(/\\n/g, '\n'), a = after.replace(/\\n/g, '\n');
  ta.value = ta.value.substring(0, start) + b + sel + a + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + b.length;
  ta.selectionEnd = start + b.length + sel.length;
}

// === Router ===
function navigateTo(path) { history.pushState(null, '', path); route(); }
function route() {
  const path = location.pathname;
  const taskMatch = path.match(/^\/task\/(\d+)$/);
  const epicMatch = path.match(/^\/epic\/(\d+)$/);
  const userMatch = path.match(/^\/user\/(\d+)$/);
  if (taskMatch) { currentView = 'task'; currentTaskId = Number(taskMatch[1]); currentEpicId = null; currentProfileId = null; }
  else if (epicMatch) { currentView = 'epic'; currentEpicId = Number(epicMatch[1]); currentTaskId = null; currentProfileId = null; }
  else if (userMatch) { currentView = 'user'; currentProfileId = Number(userMatch[1]); currentTaskId = null; currentEpicId = null; }
  else { currentView = 'board'; currentTaskId = null; currentEpicId = null; currentProfileId = null; }
  renderCurrentView();
}
window.addEventListener('popstate', route);

function renderCurrentView() {
  if (currentView === 'task' && currentTaskId) { renderTaskPage(currentTaskId).then(() => highlightCode()); }
  else if (currentView === 'epic' && currentEpicId) { renderEpicPage(currentEpicId).then(() => highlightCode()); }
  else if (currentView === 'user' && currentProfileId) { renderUserPage(currentProfileId); }
  else { renderBoard(); }
  renderSidebar();
}

// === File attachment ===
function triggerFileAttach(textareaId) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.pdf,.txt,.csv,.json,.xml,.zip,.gz,.png,.jpg,.jpeg,.gif,.webp';
  inp.onchange = async () => {
    const file = inp.files[0];
    if (!file) return;
    if (file.size > 10*1024*1024) { alert(t('fileTooLarge')); return; }
    const ta = document.getElementById(textareaId);
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await api('/api/files', 'POST', { data: base64, filename: file.name, mime: file.type });
        const link = file.type.startsWith('image/') ? `![${file.name}](${res.url})` : `[${file.name}](${res.url})`;
        if (ta) { const pos = ta.selectionStart; ta.value = ta.value.substring(0, pos) + link + ta.value.substring(ta.selectionEnd); ta.focus(); }
      } catch(e) { alert(t('uploadError') + ': ' + e.message); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

    await loadBoard();

    applyI18n();
    initTimezoneSelect();
    pollNotifications();
    // Search
    const searchEl = document.getElementById('search');
    if (searchEl) {
      searchEl.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => doSearch(this.value), 300);
      });
      searchEl.addEventListener('keydown', function(e) { if (e.key === 'Escape') { this.value = ''; doSearch(''); } });
    }
  } catch(e) {
    window.location.href = '/login';
  }
}

// === Board rendering ===
function renderBoard() {
  const app = document.getElementById('app');
  let html = '<div class="board">';
  for (const col of state.columns) {
    const colTasks = state.tasks.filter(t => t.column_id === col.id).sort((a,b) => a.position - b.position || a.id - b.id);
    const filtered = filterTasks(colTasks);
    html += `<div class="column" data-col="${col.id}" ondragover="onDragOver(event)" ondrop="onDrop(event, ${col.id})">
      <div class="col-header"><span class="col-title">${esc(col.name)} <span class="col-count">${filtered.length}</span></span></div>
      <div class="col-body">`;
    for (const task of filtered) {
      html += renderCard(task);
    }
    html += `<div class="drop-zone" ondragover="onDragOver(event)" ondrop="onDrop(event, ${col.id})"></div>`;
    if (!isReadonly()) {
      html += `<button class="add-task-btn" onclick="showCreateTask(${col.id})">${t('addTask')}</button>`;
    }
    html += '</div></div>';
  }
  html += '</div>';
  app.innerHTML = html;
}

function filterTasks(tasks) {
  let result = tasks;
  if (showPersonalOnly && currentUser) {
    result = result.filter(t => t.assignee_id === currentUser.id || (t.assignee && t.assignee.id === currentUser.id));
  }
  if (searchMatchIds !== null) {
    result = result.filter(t => searchMatchIds.includes(t.id));
  }
  return result;
}

function renderCard(task) {
  const pClass = task.priority > 0 ? `<div class="card-priority priority-${task.priority}"></div>` : '';
  const epicHtml = task.epic ? `<span class="card-epic" style="background:${task.epic.color};color:${contrastColor(task.epic.color)}" onclick="event.stopPropagation();navigateTo('/epic/${task.epic.id}')">${esc(task.epic.name)}</span>` : '';
  const tagsHtml = (task.tags || []).map(tg => `<span class="card-tag" style="background:${tg.color};color:${contrastColor(tg.color)}">${esc(tg.name)}</span>`).join('');
  const assigneeHtml = task.assignee ? `<span class="card-assignee">&#128100; ${esc(task.assignee.username)}</span>` : '';
  const todoInfo = countTodos(task.todo);
  const todoHtml = todoInfo ? `<span class="card-todo">&#9745; ${todoInfo.done}/${todoInfo.total}</span>` : '';
  const linkHtml = task.project_url ? `<span class="card-link">&#128279;</span>` : '';
  const commentsCount = (task.comments || []).length;
  const commentsHtml = commentsCount > 0 ? `<span class="card-comments">&#128172; ${commentsCount}</span>` : '';
  const deadlineHtml = task.deadline ? renderDeadlineDot(task.deadline) : '';

  return `<div class="card" draggable="${isReadonly()?'false':'true'}" data-task="${task.id}"
    onclick="navigateTo('/task/${task.id}')"
    ondragstart="onDragStart(event, ${task.id})" ondragend="onDragEnd(event)">
    ${pClass}
    <div class="card-title">${esc(task.title)}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="card-id">#${task.id}</span>
      <div class="card-meta">${deadlineHtml}${epicHtml}${tagsHtml}${assigneeHtml}${todoHtml}${linkHtml}${commentsHtml}</div>
    </div>
  </div>`;
}

function renderDeadlineDot(deadline) {
  if (!deadline) return '';
  const dl = new Date(deadline);
  const now = new Date();
  const diff = dl - now;
  const hours = diff / (1000*60*60);
  let cls = 'card-deadline';
  if (diff < 0) cls += ' overdue';
  else if (hours < 48) cls += ' soon';
  const remaining = formatTimeRemaining(diff);
  return `<span class="${cls}"><span class="deadline-popup">${t('deadline')}: ${fmtDate(deadline)}<br>${remaining}</span></span>`;
}

function formatTimeRemaining(diff) {
  if (diff < 0) return t('deadlinePassed') + ' ' + formatDuration(-diff);
  return t('deadlineLeft') + ' ' + formatDuration(diff);
}

function formatDuration(ms) {
  const d = Math.floor(ms / (1000*60*60*24));
  const h = Math.floor((ms % (1000*60*60*24)) / (1000*60*60));
  if (d > 0) return d + 'd ' + h + 'h';
  const m = Math.floor((ms % (1000*60*60)) / (1000*60));
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

// === Drag & Drop ===
function onDragStart(e, taskId) { draggedTaskId = taskId; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragEnd(e) { e.target.classList.remove('dragging'); draggedTaskId = null; document.querySelectorAll('.drop-zone.over').forEach(z => z.classList.remove('over')); }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; const dz = e.target.closest('.drop-zone'); if (dz) dz.classList.add('over'); }
async function onDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.drop-zone.over').forEach(z => z.classList.remove('over'));
  if (!draggedTaskId) return;
  const colBody = e.target.closest('.col-body');
  const cards = colBody ? Array.from(colBody.querySelectorAll('.card')) : [];
  let pos = cards.length;
  const dropTarget = e.target.closest('.card');
  if (dropTarget) {
    const idx = cards.indexOf(dropTarget);
    if (idx >= 0) pos = idx;
  }
  try {
    await api('/api/tasks/move', 'POST', { task_id: draggedTaskId, column_id: colId, position: pos });
    const task = state.tasks.find(t => t.id === draggedTaskId);
    if (task) { task.column_id = colId; task.position = pos; }
    renderBoard();
  } catch(e) { console.error(e); }
  draggedTaskId = null;
}

// === Comment draft preservation ===
const commentDrafts = {};
function getCommentDraft(taskId) { return commentDrafts[taskId] || ''; }
function saveCommentDraft(taskId, text) { commentDrafts[taskId] = text; }
function clearCommentDraft(taskId) { delete commentDrafts[taskId]; }

// === Comment rendering with deep nesting ===
function renderComments(comments, taskId, depth) {
  if (!depth) depth = 0;
  let html = '';
  for (const c of comments) {
    const authorName = c.author ? c.author.username : '?';
    const isEdited = c.updated_at && new Date(c.updated_at).getFullYear() > 1 && c.created_at && (new Date(c.updated_at).getTime() - new Date(c.created_at).getTime() > 2000);
    const editedHtml = isEdited ? ` <span class="comment-edited" title="${t('created')}: ${fmtDate(c.created_at)}&#10;${t('updated')}: ${fmtDate(c.updated_at)}">(${t('edited')})</span>` : '';
    const canEdit = currentUser && c.author && c.author.id === currentUser.id;

    html += `<div class="comment" id="comment-${c.id}">
      <div class="comment-author"><a href="/user/${c.author?c.author.id:0}" onclick="navigateTo('/user/${c.author?c.author.id:0}');return false;">@${esc(authorName)}</a></div>
      <div class="comment-text" id="comment-text-${c.id}"><div class="md-content">${renderMd(c.text)}</div></div>
      <div class="comment-time">
        <span>${fmtDate(c.created_at)}${editedHtml}</span>
        <div class="comment-actions">
          ${!isReadonly() ? `<button onclick="showReplyForm(${c.id},${taskId})">${t('reply')}</button>` : ''}
          ${canEdit ? `<button onclick="showEditComment(${c.id},${taskId})">${t('edit')}</button>` : ''}
          ${canEdit || isAdmin() ? `<button onclick="deleteComment(${c.id},${taskId})" style="color:var(--red)">${t('delete')}</button>` : ''}
        </div>
      </div>
      <div id="reply-form-${c.id}"></div>`;
    if (c.replies && c.replies.length > 0) {
      html += `<div class="comment-replies">${renderComments(c.replies, taskId, depth+1)}</div>`;
    }
    html += '</div>';
  }
  return html;
}

function showReplyForm(commentId, taskId) {
  const el = document.getElementById('reply-form-' + commentId);
  if (!el) return;
  if (el.innerHTML) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="reply-form">
    ${insertMdToolbar('reply-text-'+commentId)}
    <textarea id="reply-text-${commentId}" placeholder="${t('writeComment')}"></textarea>
    <div style="display:flex;gap:4px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('reply-form-${commentId}').innerHTML=''">${t('cancel')}</button>
      <button class="btn btn-primary btn-sm" onclick="submitReply(${taskId},${commentId})">${t('send')}</button>
    </div>
  </div>`;
  const ta = document.getElementById('reply-text-' + commentId);
  if (ta) { setupPaste(ta); ta.focus(); }
}

function showEditComment(commentId, taskId) {
  const el = document.getElementById('comment-text-' + commentId);
  if (!el) return;
  const mdEl = el.querySelector('.md-content');
  // Get original text from rendered markdown - we need the raw text
  // Store original in data attr on first edit
  if (!el.dataset.rawText) {
    // Fetch the task again to get raw text
    api('/api/tasks/' + taskId).then(task => {
      const comment = findCommentById(task.comments, commentId);
      if (!comment) return;
      el.dataset.rawText = comment.text;
      replaceWithEditForm(el, commentId, taskId, comment.text);
    });
    return;
  }
  replaceWithEditForm(el, commentId, taskId, el.dataset.rawText);
}

function findCommentById(comments, id) {
  for (const c of comments) {
    if (c.id === id) return c;
    if (c.replies) {
      const found = findCommentById(c.replies, id);
      if (found) return found;
    }
  }
  return null;
}

function replaceWithEditForm(el, commentId, taskId, rawText) {
  el.innerHTML = `<div class="reply-form">
    ${insertMdToolbar('edit-comment-'+commentId)}
    <textarea id="edit-comment-${commentId}" style="min-height:80px">${esc(rawText)}</textarea>
    <div style="display:flex;gap:4px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="renderTaskPage(${taskId})">${t('cancel')}</button>
      <button class="btn btn-primary btn-sm" onclick="saveEditComment(${commentId},${taskId})">${t('save')}</button>
    </div>
  </div>`;
  const ta = document.getElementById('edit-comment-' + commentId);
  if (ta) { setupPaste(ta); ta.focus(); }
}

async function submitComment(taskId) {
  const ta = document.getElementById('comment-text');
  if (!ta || !ta.value.trim()) return;
  try {
    await api('/api/comments', 'POST', { task_id: taskId, text: ta.value.trim() });
    clearCommentDraft(taskId);
    ta.value = '';
    // Reload comments only
    const task = await api('/api/tasks/' + taskId);
    const cl = document.getElementById('comments-list');
    if (cl) {
      cl.innerHTML = (task.comments && task.comments.length > 0)
        ? renderComments(task.comments, taskId)
        : `<p style="color:var(--fg3);font-size:.85rem">${t('noComments')}</p>`;
      highlightCode();
    }
  } catch(e) { alert(t('error') + ': ' + e.message); }
}

async function submitReply(taskId, parentId) {
  const ta = document.getElementById('reply-text-' + parentId);
  if (!ta || !ta.value.trim()) return;
  try {
    await api('/api/comments', 'POST', { task_id: taskId, text: ta.value.trim(), parent_id: parentId });
    await refreshComments(taskId);
  } catch(e) { alert(t('error') + ': ' + e.message); }
}

async function saveEditComment(commentId, taskId) {
  const ta = document.getElementById('edit-comment-' + commentId);
  if (!ta || !ta.value.trim()) return;
  try {
    await api('/api/comments/' + commentId, 'PUT', { text: ta.value.trim() });
    await refreshComments(taskId);
  } catch(e) { alert(t('error') + ': ' + e.message); }
}

async function deleteComment(commentId, taskId) {
  try { await api('/api/comments/' + commentId, 'DELETE'); await refreshComments(taskId); } catch(e) { alert(t('error')); }
}

async function refreshComments(taskId) {
  const task = await api('/api/tasks/' + taskId);
  const cl = document.getElementById('comments-list');
  if (cl) {
    cl.innerHTML = (task.comments && task.comments.length > 0)
      ? renderComments(task.comments, taskId)
      : `<p style="color:var(--fg3);font-size:.85rem">${t('noComments')}</p>`;
    highlightCode();
  }
}

// === TODO items ===
async function toggleTodo(taskId, index, checked) {
  const task = await api('/api/tasks/' + taskId);
  const items = parseTodoItems(task.todo);
  if (items[index]) items[index].done = checked;
  await api('/api/tasks/' + taskId, 'PUT', { ...taskToReq(task), todo: todoItemsToText(items) });
  // Update just the todo item DOM
  const todoEl = document.querySelectorAll('.todo-item')[index];
  if (todoEl) {
    todoEl.classList.toggle('done', checked);
  }
}
async function addTodoItem(taskId) {
  const inp = document.getElementById('todo-new');
  if (!inp || !inp.value.trim()) return;
  const label = inp.value.trim();
  const task = await api('/api/tasks/' + taskId);
  const items = parseTodoItems(task.todo);
  items.push({ done: false, label });
  await api('/api/tasks/' + taskId, 'PUT', { ...taskToReq(task), todo: todoItemsToText(items) });
  inp.value = '';
  // Append new item to the list
  const list = document.querySelector('.todo-list');
  if (list) {
    const idx = items.length - 1;
    const div = document.createElement('div');
    div.className = 'todo-item';
    div.innerHTML = `<input type="checkbox" onchange="toggleTodo(${taskId},${idx},this.checked)">
      <span class="todo-text">${esc(label)}</span>
      <button class="btn-icon" onclick="deleteTodoItem(${taskId},${idx})">&#10005;</button>`;
    list.appendChild(div);
  }
}
async function deleteTodoItem(taskId, index) {
  const task = await api('/api/tasks/' + taskId);
  const items = parseTodoItems(task.todo);
  items.splice(index, 1);
  await api('/api/tasks/' + taskId, 'PUT', { ...taskToReq(task), todo: todoItemsToText(items) });
  // Re-render the todo section by refreshing the page section
  renderTaskPage(taskId);
}

function taskToReq(task) {
  return {
    title: task.title, description: task.description, todo: task.todo, project_url: task.project_url,
    column_id: task.column_id, epic_id: task.epic_id, assignee_id: task.assignee_id,
    priority: task.priority, tag_ids: (task.tags||[]).map(t=>t.id),
    depends_on_ids: (task.depends_on||[]).map(d=>d.id),
    deadline: task.deadline || ''
  };
}

async function toggleSubscription(taskId, isSubscribed) {
  try {
    if (isSubscribed) { await api('/api/unsubscribe', 'POST', { task_id: taskId }); }
    else { await api('/api/subscribe', 'POST', { task_id: taskId }); }
    // Update button text without full re-render
    const btn = document.getElementById('sub-btn-' + taskId);
    if (btn) {
      const newState = !isSubscribed;
      btn.textContent = newState ? t('unsubscribe') : t('subscribe');
      btn.setAttribute('onclick', `toggleSubscription(${taskId}, ${newState})`);
    }
  } catch(e) { alert(t('error')); }
}

// === Epic Page ===
async function renderEpicPage(epicId) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="epic-page"><p>Loading...</p></div>';
  let data;
  try { data = await api('/api/epics/' + epicId); } catch { app.innerHTML = `<div class="epic-page"><p>${t('notFound')}</p><a href="/" onclick="navigateTo('/');return false;">${t('backToBoard')}</a></div>`; return; }
  const epic = data.epic;
  const tasks = data.tasks || [];
  const lastCol = state.columns.length ? state.columns[state.columns.length-1] : null;
  const done = lastCol ? tasks.filter(t => t.column_id === lastCol.id).length : 0;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  let html = `<div class="epic-page">
    <div class="epic-page-header">
      <h2><span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${epic.color};margin-right:6px;vertical-align:middle"></span>${esc(epic.name)}</h2>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="navigateTo('/')">${t('back')}</button>
        ${!isReadonly() ? `<button class="btn btn-ghost btn-sm" onclick="showEditEpic(${epic.id})">${t('editEpic')}</button>` : ''}
      </div>
    </div>`;
  if (epic.description) {
    html += `<div class="task-page-section" style="margin-bottom:16px"><div class="md-content">${renderMd(epic.description)}</div></div>`;
  }
  html += `<div class="epic-progress" style="margin-bottom:16px">
      <span class="epic-progress-text">${done}/${tasks.length} ${t('tasksCompleted')} (${pct}%)</span>
      <div class="epic-progress-bar"><div class="epic-progress-fill" style="width:${pct}%;background:${epic.color}"></div></div>
    </div>
    <div class="epic-task-list">`;
  for (const task of tasks) {
    const colName = state.columns.find(c => c.id === task.column_id);
    const prioColors = ['','var(--blue)','var(--green)','var(--orange)','var(--red)'];
    html += `<div class="epic-task-row" onclick="navigateTo('/task/${task.id}')">
      <span class="card-id">#${task.id}</span>
      <span class="epic-task-title">${esc(task.title)}</span>
      <span class="epic-task-status">${colName ? esc(colName.name) : ''}</span>
      ${task.priority > 0 ? `<span class="epic-task-prio" style="color:${prioColors[task.priority]}">P${task.priority}</span>` : ''}
    </div>`;
  }
  if (tasks.length === 0) html += `<p style="color:var(--fg3)">${t('noActiveTasks')}</p>`;
  html += '</div></div>';
  app.innerHTML = html;
}

// === User Page ===
async function renderUserPage(userId) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="user-page"><p>Loading...</p></div>';
  let data;
  try { data = await api('/api/user/activity/' + userId); } catch { app.innerHTML = `<div class="user-page"><p>${t('notFound')}</p><a href="/" onclick="navigateTo('/');return false;">${t('backToBoard')}</a></div>`; return; }
  const user = data.user;
  const activity = data.activity || [];

  // Count tasks assigned to user
  const assigned = state.tasks.filter(t => t.assignee_id === user.id || (t.assignee && t.assignee.id === user.id));

  let html = `<div class="user-page">
    <div class="user-page-header">
      <h2>&#128100; ${esc(user.username)}</h2>
      <div style="font-size:.82rem;color:var(--fg3);margin-top:4px">${t('role')}: ${t(user.role)} &middot; ${t('created')}: ${user.created_at}</div>
    </div>`;

  // Assigned tasks
  if (assigned.length > 0) {
    html += `<div class="task-page-section" style="margin-bottom:16px"><h3>${t('assignee')} (${assigned.length})</h3><div class="epic-task-list">`;
    for (const task of assigned) {
      const colName = state.columns.find(c => c.id === task.column_id);
      html += `<div class="epic-task-row" onclick="navigateTo('/task/${task.id}')">
        <span class="card-id">#${task.id}</span>
        <span class="epic-task-title">${esc(task.title)}</span>
        <span class="epic-task-status">${colName ? esc(colName.name) : ''}</span>
      </div>`;
    }
    html += '</div></div>';
  }

  // Activity
  html += `<div class="task-page-section"><h3>${t('activity')}</h3><div class="activity-list">`;
  if (activity.length === 0) {
    html += `<p style="color:var(--fg3);font-size:.85rem">${t('noActivity')}</p>`;
  } else {
    for (const a of activity) {
      const taskLink = a.task_id ? `<a href="/task/${a.task_id}" onclick="navigateTo('/task/${a.task_id}');return false;">#${a.task_id}</a>` : '';
      const actionLabels = {create_task:'создал(а) задачу',edit_task:'обновил(а) задачу',move_task:'переместил(а) задачу',comment:'комментарий',delete_task:'удалил(а) задачу',assign:'назначил(а)'};
      const actionText = actionLabels[a.action] || a.action;
      const detailsHtml = a.details ? `<div style="font-size:.78rem;color:var(--fg3);margin-top:2px;white-space:pre-line">${esc(a.details)}</div>` : '';
      html += `<div class="activity-item" style="flex-direction:column;align-items:flex-start">
        <div style="display:flex;gap:10px;align-items:center;width:100%"><span class="activity-time">${fmtDate(a.created_at)}</span><span class="activity-action">${actionText} ${taskLink}</span></div>
        ${detailsHtml}
      </div>`;
    }
  }
  html += '</div></div></div>';
  app.innerHTML = html;
}

// === Notifications ===
let notifOpen = false;
function toggleNotifications() {
  notifOpen = !notifOpen;
  const dd = document.getElementById('notif-dropdown');
  if (!dd) return;
  if (notifOpen) { loadNotifications(); dd.classList.remove('hidden'); }
  else { dd.classList.add('hidden'); }
}

async function loadNotifications() {
  const dd = document.getElementById('notif-dropdown');
  if (!dd) return;
  try {
    const notifs = await api('/api/notifications');
    if (notifs.length === 0) {
      dd.innerHTML = `<p style="color:var(--fg3);font-size:.85rem;text-align:center;padding:20px">${t('noNotifications')}</p>`;
      return;
    }
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-weight:600;font-size:.9rem">${t('notifications')}</span>
      <button class="btn btn-ghost btn-sm" onclick="markAllRead()">${t('markAllRead')}</button>
    </div>`;
    for (const n of notifs) {
      html += `<div class="notif-item ${n.is_read?'':'unread'}" onclick="readNotification(${n.id}, ${n.task_id || 'null'})">
        <div>${esc(n.text)}</div>
        <div class="notif-time">${fmtDate(n.created_at)}</div>
      </div>`;
    }
    dd.innerHTML = html;
  } catch(e) { dd.innerHTML = `<p style="color:var(--red)">${t('error')}</p>`; }
}

async function readNotification(id, taskId) {
  try { await api('/api/notifications/read', 'POST', { id }); } catch {}
  if (taskId) { toggleNotifications(); navigateTo('/task/' + taskId); }
  else { loadNotifications(); }
  refreshNotifCount();
}

async function markAllRead() {
  try { await api('/api/notifications/read-all', 'POST'); loadNotifications(); refreshNotifCount(); } catch {}
}

async function refreshNotifCount() {
  try {
    const me = await api('/api/auth/me');
    currentUser = me;
    const nb = document.getElementById('notif-count');
    if (nb) {
      if (me.unread > 0) { nb.textContent = me.unread; nb.classList.remove('hidden'); }
      else { nb.classList.add('hidden'); }
    }
  } catch {}
}

function pollNotifications() {
  setInterval(refreshNotifCount, 30000);
}

// Close notif dropdown on outside click
document.addEventListener('click', function(e) {
  if (notifOpen && !e.target.closest('#notif-dropdown') && !e.target.closest('#notif-btn')) {
    notifOpen = false;
    const dd = document.getElementById('notif-dropdown');
    if (dd) dd.classList.add('hidden');
  }
});

// === Search ===
async function doSearch(query) {
  searchQuery = query.trim();
  const resultsEl = document.getElementById('search-results');
  if (!searchQuery) {
    searchMatchIds = null;
    if (resultsEl) resultsEl.classList.add('hidden');
    if (currentView === 'board') renderBoard();
    return;
  }
  try {
    const res = await api('/api/search?q=' + encodeURIComponent(searchQuery));
    searchMatchIds = res.task_ids || [];
    if (currentView === 'board') renderBoard();
    // Show results dropdown
    if (resultsEl) {
      if (searchMatchIds.length === 0) {
        resultsEl.innerHTML = `<p style="color:var(--fg3)">${t('nothingFound')}</p>`;
      } else {
        const matchTasks = searchMatchIds.slice(0, 20).map(id => state.tasks.find(t => t.id === id)).filter(Boolean);
        resultsEl.innerHTML = matchTasks.map(t => `<div class="search-result-item" onclick="navigateTo('/task/${t.id}');document.getElementById('search').value='';doSearch('')">
          <span class="card-id">#${t.id}</span><span>${esc(t.title)}</span>
        </div>`).join('') + (searchMatchIds.length > 20 ? `<p style="color:var(--fg3);font-size:.82rem">${t('andMore')}</p>` : '');
      }
      resultsEl.classList.remove('hidden');
    }
  } catch { searchMatchIds = null; }
}

// Close search results on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('#search') && !e.target.closest('#search-results')) {
    const r = document.getElementById('search-results');
    if (r) r.classList.add('hidden');
  }
});

// === CRUD: Create/Edit Task ===
function showCreateTask(colId) {
  showTaskModal(null, colId);
}
function showEditTask(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) { api('/api/tasks/' + taskId).then(t => showTaskModal(t, t.column_id)); return; }
  api('/api/tasks/' + taskId).then(t => showTaskModal(t, t.column_id));
}

function showTaskModal(task, defaultColId) {
  const isEdit = !!task;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

  const availableDeps = state.tasks.filter(t => !task || t.id !== task.id);
  const selectedDepIds = task && task.depends_on ? task.depends_on.map(d => d.id) : [];

  overlay.innerHTML = `<div class="modal">
    <div class="modal-header"><h2>${isEdit ? t('editTask') : t('newTask')}</h2><button class="btn-icon" onclick="this.closest('.modal-overlay').remove()">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><label>${t('title')}</label><input id="task-title" value="${isEdit ? escAttr(task.title) : ''}"></div>
      <div class="field-row">
        <div class="field"><label>${t('column')}</label><select id="task-col">${state.columns.map(c => `<option value="${c.id}" ${c.id===(isEdit?task.column_id:defaultColId)?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
        <div class="field"><label>${t('priority')}</label><select id="task-prio">
          <option value="0" ${(!isEdit||task.priority===0)?'selected':''}>${t('none')}</option>
          <option value="1" ${(isEdit&&task.priority===1)?'selected':''}>${t('low')}</option>
          <option value="2" ${(isEdit&&task.priority===2)?'selected':''}>${t('medium')}</option>
          <option value="3" ${(isEdit&&task.priority===3)?'selected':''}>${t('high')}</option>
          <option value="4" ${(isEdit&&task.priority===4)?'selected':''}>${t('critical')}</option>
        </select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>${t('epic')}</label><select id="task-epic">
          <option value="">${t('none')}</option>
          ${state.epics.map(e => `<option value="${e.id}" ${(isEdit&&task.epic_id===e.id)?'selected':''}>${esc(e.name)}</option>`).join('')}
        </select></div>
        <div class="field"><label>${t('assignee')}</label><select id="task-assignee">
          <option value="">${t('none')}</option>
          ${state.users.map(u => `<option value="${u.id}" ${(isEdit&&task.assignee_id===u.id)?'selected':''}>${esc(u.username)}</option>`).join('')}
        </select></div>
      </div>
      <div class="field"><label>${t('description')} <small style="color:var(--fg3)">(${t('markdown')})</small></label>
        ${insertMdToolbar('task-desc')}
        <textarea id="task-desc" rows="4">${isEdit ? esc(task.description) : ''}</textarea>
      </div>
      <div class="field"><label>${t('todo')}</label>
        <textarea id="task-todo" rows="3" placeholder="- [ ] item">${isEdit ? esc(task.todo) : ''}</textarea>
      </div>
      <div class="field-row">
        <div class="field"><label>${t('projectUrl')}</label><input id="task-url" value="${isEdit ? escAttr(task.project_url) : ''}"></div>
        <div class="field"><label>${t('deadline')}</label><input type="datetime-local" id="task-deadline" value="${isEdit && task.deadline ? escAttr(task.deadline.slice(0,16)) : ''}" style="color-scheme:dark"></div>
      </div>
      <div class="field"><label>${t('tags')}</label>
        <div class="checkbox-group">${state.tags.map(tg => {
          const sel = isEdit && task.tags && task.tags.some(tt => tt.id === tg.id);
          return `<span class="chip ${sel?'selected':''}" style="background:${tg.color};color:${contrastColor(tg.color)}" onclick="this.classList.toggle('selected')" data-tag-id="${tg.id}">${esc(tg.name)}</span>`;
        }).join('')}</div>
      </div>
      <div class="field"><label>${t('dependsOn')}</label>
        <div class="dep-search-wrap">
          <input class="dep-search-input" id="dep-filter" placeholder="${t('filterDeps')}" oninput="filterDepList(this.value)">
          <div class="dep-selected" id="dep-selected">${selectedDepIds.map(id => {
            const dt = availableDeps.find(t => t.id === id);
            return dt ? `<span class="dep-chip" data-dep-id="${id}">#${id} ${esc(dt.title)}<button onclick="removeDepChip(${id})">&#10005;</button></span>` : '';
          }).join('')}</div>
          <div class="dep-list" id="dep-list">${availableDeps.slice(0,50).map(t => {
            const checked = selectedDepIds.includes(t.id) ? 'checked' : '';
            return `<label class="dep-list-item" data-title="${escAttr(t.title).toLowerCase()}"><input type="checkbox" value="${t.id}" ${checked} onchange="toggleDep(${t.id}, this.checked)">#${t.id} ${esc(t.title)}</label>`;
          }).join('')}</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      ${isEdit ? `<button class="btn btn-danger" onclick="deleteTask(${task.id})" style="margin-right:auto">${t('deleteTask')}</button>` : ''}

      <button class="btn btn-primary" onclick="saveTask(${isEdit ? task.id : 'null'}, this)">${isEdit ? t('save') : t('createTask')}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  // Setup paste for description textarea
  const descTa = document.getElementById('task-desc');
  if (descTa) setupPaste(descTa);
  document.getElementById('task-title').focus();
}

function filterDepList(query) {
  const items = document.querySelectorAll('#dep-list .dep-list-item');
  const q = query.toLowerCase();
  items.forEach(item => {
    const title = item.dataset.title || '';
    const text = item.textContent.toLowerCase();
    item.style.display = (!q || title.includes(q) || text.includes(q)) ? '' : 'none';
  });
}

function toggleDep(id, checked) {
  const container = document.getElementById('dep-selected');
  if (!container) return;
  if (checked) {
    const task = state.tasks.find(t => t.id === id);
    const chip = document.createElement('span');
    chip.className = 'dep-chip';
    chip.dataset.depId = id;
    chip.innerHTML = `#${id} ${task ? esc(task.title) : ''}<button onclick="removeDepChip(${id})">&#10005;</button>`;
    container.appendChild(chip);
  } else {
    const chip = container.querySelector(`[data-dep-id="${id}"]`);
    if (chip) chip.remove();
  }
}

function removeDepChip(id) {
  const chip = document.querySelector(`#dep-selected [data-dep-id="${id}"]`);
  if (chip) chip.remove();
  const cb = document.querySelector(`#dep-list input[value="${id}"]`);
  if (cb) cb.checked = false;
}

async function saveTask(taskId, btn) {
  btn.disabled = true;
  const title = document.getElementById('task-title').value.trim();
  const colId = parseInt(document.getElementById('task-col').value);
  const priority = parseInt(document.getElementById('task-prio').value);
  const epicVal = document.getElementById('task-epic').value;
  const assigneeVal = document.getElementById('task-assignee').value;
  const desc = document.getElementById('task-desc').value;
  const todo = document.getElementById('task-todo').value;
  const url = document.getElementById('task-url').value.trim();
  const deadlineVal = document.getElementById('task-deadline').value;
  const tagIds = Array.from(document.querySelectorAll('.chip.selected[data-tag-id]')).map(el => parseInt(el.dataset.tagId));
  const depIds = Array.from(document.querySelectorAll('#dep-selected .dep-chip')).map(el => parseInt(el.dataset.depId));

  if (!title || !colId) { btn.disabled = false; alert(t('error')); return; }

  const body = {
    title, description: desc, todo, project_url: url, column_id: colId,
    epic_id: epicVal ? parseInt(epicVal) : null,
    assignee_id: assigneeVal ? parseInt(assigneeVal) : null,
    priority, tag_ids: tagIds, depends_on_ids: depIds,
    deadline: deadlineVal || ''
  };

  try {
    if (taskId) {
      await api('/api/tasks/' + taskId, 'PUT', body);
    } else {
      const res = await api('/api/tasks', 'POST', body);
      taskId = res.id;
    }
    document.querySelector('.modal-overlay').remove();
    await loadBoard();
    if (currentView === 'task') renderTaskPage(taskId);
    else renderBoard();
  } catch(e) { btn.disabled = false; alert(t('error') + ': ' + e.message); }
}

async function deleteTask(taskId) {
  if (!confirm(t('deleteConfirm'))) return;
  try { await api('/api/tasks/' + taskId, 'DELETE'); await loadBoard(); navigateTo('/'); } catch(e) { alert(t('error')); }
}

// === CRUD: Columns ===
async function addColumn() {
  const inp = document.getElementById('new-col-name');
  if (!inp || !inp.value.trim()) return;
  try { await api('/api/columns', 'POST', { Name: inp.value.trim() }); inp.value = ''; await loadBoard(); } catch(e) { alert(t('error')); }
}
async function renameColumn(id, oldName) {
  const name = prompt(t('title'), oldName);
  if (!name || name === oldName) return;
  try { await api('/api/columns/' + id, 'PUT', { Name: name }); await loadBoard(); } catch(e) { alert(t('error')); }
}
async function deleteColumn(id) {
  const colTasks = state.tasks.filter(t => t.column_id === id);
  if (colTasks.length > 0) { alert(t('moveTasksFirst')); return; }
  if (!confirm(t('confirmDeleteCol') + '?')) return;
  try { await api('/api/columns/' + id, 'DELETE'); await loadBoard(); } catch(e) { alert(t('error')); }
}
async function moveColumnOrder(index, dir) {
  const ids = state.columns.map(c => c.id);
  const swapIdx = index + dir;
  if (swapIdx < 0 || swapIdx >= ids.length) return;
  [ids[index], ids[swapIdx]] = [ids[swapIdx], ids[index]];
  try { await api('/api/columns/reorder', 'POST', { ids }); await loadBoard(); } catch(e) { alert(t('error')); }
}

// === CRUD: Epics ===
async function addEpic() {
  const nameEl = document.getElementById('epic-name');
  const colorEl = document.getElementById('epic-color');
  if (!nameEl || !nameEl.value.trim()) return;
  try { await api('/api/epics', 'POST', { Name: nameEl.value.trim(), Color: colorEl.value }); nameEl.value = ''; await loadBoard(); } catch(e) { alert(t('error')); }
}
async function deleteEpic(id) {
  const cnt = state.tasks.filter(t => t.epic_id === id).length;
  if (!confirm(t('confirmDeleteEpic') + '? ' + cnt + ' ' + t('tasksWillUnlink'))) return;
  try { await api('/api/epics/' + id, 'DELETE'); await loadBoard(); } catch(e) { alert(t('error')); }
}
function showEditEpic(epicId) {
  const epic = state.epics.find(e => e.id === epicId);
  if (!epic) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">
    <div class="modal-header"><h2>${t('editEpic')}</h2><button class="btn-icon" onclick="this.closest('.modal-overlay').remove()">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><label>${t('title')}</label><input id="epic-edit-name" value="${escAttr(epic.name)}"></div>
      <div class="field"><label>Color</label><input type="color" id="epic-edit-color" value="${epic.color}"></div>
      <div class="field"><label>${t('description')}</label>
        ${insertMdToolbar('epic-edit-desc')}
        <textarea id="epic-edit-desc" rows="4">${esc(epic.description || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">${t('cancel')}</button>
      <button class="btn btn-primary" onclick="saveEpicEdit(${epicId})">${t('save')}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
async function saveEpicEdit(epicId) {
  const name = document.getElementById('epic-edit-name').value.trim();
  const color = document.getElementById('epic-edit-color').value;
  const desc = document.getElementById('epic-edit-desc').value;
  if (!name) return;
  try { await api('/api/epics/' + epicId, 'PUT', { name, color, description: desc }); document.querySelector('.modal-overlay').remove(); await loadBoard(); renderEpicPage(epicId); } catch(e) { alert(t('error')); }
}

// === CRUD: Tags ===
async function addTag() {
  const nameEl = document.getElementById('tag-name');
  const colorEl = document.getElementById('tag-color');
  if (!nameEl || !nameEl.value.trim()) return;
  try { await api('/api/tags', 'POST', { Name: nameEl.value.trim(), Color: colorEl.value }); nameEl.value = ''; await loadBoard(); } catch(e) { alert(t('error')); }
}
async function deleteTag(id) {
  if (!confirm(t('confirmDeleteTag') + '?')) return;
  try { await api('/api/tags/' + id, 'DELETE'); await loadBoard(); } catch(e) { alert(t('error')); }
}

// === CRUD: Users ===
async function addUser() {
  const nameEl = document.getElementById('new-user-name');
  const passEl = document.getElementById('new-user-pass');
  const roleEl = document.getElementById('new-user-role');
  if (!nameEl || !passEl || !nameEl.value.trim() || passEl.value.length < 6) { alert(t('userRequired')); return; }
  try {
    await api('/api/users', 'POST', { username: nameEl.value.trim(), password: passEl.value, role: roleEl.value });
    nameEl.value = ''; passEl.value = '';
    await loadBoard();
  } catch(e) { alert(t('error') + ': ' + e.message); }
}
async function deleteUser(id) {
  if (!confirm(t('confirmDeleteUser') + '?')) return;
  try { await api('/api/users/' + id, 'DELETE'); await loadBoard(); } catch(e) { alert(t('error') + ': ' + e.message); }
}
async function changeUserRole(id, currentRole) {
  const roles = ['admin','regular','readonly'];
  const nextIdx = (roles.indexOf(currentRole) + 1) % roles.length;
  const newRole = roles[nextIdx];
  try { await api('/api/users/' + id, 'PUT', { role: newRole }); await loadBoard(); } catch(e) { alert(t('error')); }
}
async function resetUserPassword(id) {
  const pw = prompt(t('newPassword'));
  if (!pw || pw.length < 6) { if (pw !== null) alert(t('userRequired')); return; }
  try { await api('/api/users/' + id, 'PUT', { password: pw }); alert('OK'); } catch(e) { alert(t('error')); }
}

// === Own password change ===
async function changeOwnPassword() {
  const pw = prompt(t('newPassword'));
  if (!pw || pw.length < 6) { if (pw !== null) alert(t('userRequired')); return; }
  try { await api('/api/user/password', 'POST', { password: pw }); alert(t('passwordChanged')); } catch(e) { alert(t('error')); }
}

// === Export / Import ===
async function exportBoard() {
  try {
    const r = await fetch('/api/export');
    if (!r.ok) throw new Error(await r.text());
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'kanban-export.json'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert(t('exportError')); }
}
async function importBoard(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm(t('importConfirm'))) { input.value = ''; return; }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    await api('/api/import', 'POST', data);
    input.value = '';
    alert(t('importDone'));
    await loadBoard();
  } catch(e) { alert(t('importError') + ': ' + e.message); }
}

// === Logout ===
async function logout() {
  try { await api('/api/auth/logout', 'POST'); } catch {}
  window.location.href = '/login';
}

// === Close sidebar on outside click ===
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('sidebar');
  if (sidebar && sidebar.classList.contains('open') && !e.target.closest('.sidebar') && !e.target.closest('[onclick*="toggleSidebar"]')) {
    sidebar.classList.remove('open');
  }
});

// === Keyboard shortcuts ===
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const modal = document.querySelector('.modal-overlay');
    if (modal) modal.remove();
    const sidebar = document.getElementById('sidebar');
    if (sidebar && sidebar.classList.contains('open')) sidebar.classList.remove('open');
  }
});

// === Start ===
init();
</script>
</body>
</html>
