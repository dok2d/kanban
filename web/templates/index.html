<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* === Theme variables === */
:root, [data-theme="dark"]{
  --bg:#0f1117;--bg2:#181a24;--bg3:#1e2030;--bg4:#262840;
  --fg:#c8cad8;--fg2:#8b8fa8;--fg3:#5c6078;
  --accent:#7c6ff7;--accent2:#a78bfa;
  --red:#ef4444;--orange:#f59e0b;--green:#22c55e;--blue:#3b82f6;
  --radius:6px;--radius-lg:10px;
  --shadow:0 2px 8px rgba(0,0,0,.3);
  --col-w:300px;
  --font-size:14px;
}
[data-theme="light"]{
  --bg:#f5f5f7;--bg2:#ffffff;--bg3:#eef0f4;--bg4:#d8dbe5;
  --fg:#1a1a2e;--fg2:#4a4e69;--fg3:#8b8fa8;
  --accent:#6c5ce7;--accent2:#5b4cdb;
  --red:#dc2626;--orange:#d97706;--green:#16a34a;--blue:#2563eb;
  --shadow:0 2px 8px rgba(0,0,0,.1);
}
[data-theme="ocean"]{
  --bg:#0b1622;--bg2:#101d2e;--bg3:#162435;--bg4:#1e3148;
  --fg:#c4d4e0;--fg2:#7f99b0;--fg3:#506882;
  --accent:#0ea5e9;--accent2:#38bdf8;
  --red:#f43f5e;--orange:#fb923c;--green:#34d399;--blue:#60a5fa;
  --shadow:0 2px 8px rgba(0,0,0,.4);
}
[data-theme="forest"]{
  --bg:#0f1a0f;--bg2:#162016;--bg3:#1c2b1c;--bg4:#2a3f2a;
  --fg:#c4d8c4;--fg2:#88a888;--fg3:#5c7a5c;
  --accent:#22c55e;--accent2:#4ade80;
  --red:#ef4444;--orange:#f59e0b;--green:#22c55e;--blue:#60a5fa;
  --shadow:0 2px 8px rgba(0,0,0,.35);
}

html{font-size:var(--font-size)}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
a{color:var(--accent2);text-decoration:none}

/* header — fixed position, never scrolls */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--bg4);position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
.header h1{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--accent2);letter-spacing:-.02em}
.header h1 a{color:inherit;text-decoration:none}
.header-actions{display:flex;gap:8px;align-items:center}

/* spacer so content isn't behind fixed header */
.header-spacer{height:52px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.85rem;font-family:inherit;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--fg2);border:1px solid var(--bg4)}
.btn-ghost:hover{background:var(--bg3);color:var(--fg)}
.btn-danger{background:transparent;color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.15)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-icon{padding:4px 8px;background:transparent;border:none;color:var(--fg3);cursor:pointer;border-radius:var(--radius)}
.btn-icon:hover{color:var(--fg);background:var(--bg4)}

/* board */
.board{display:flex;gap:16px;padding:20px 24px;min-height:calc(100vh - 52px);align-items:flex-start;overflow-x:auto}
.column{background:var(--bg2);border-radius:var(--radius-lg);width:var(--col-w);min-width:var(--col-w);flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100vh - 90px)}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 10px;border-bottom:1px solid var(--bg3)}
.col-title{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px}
.col-count{background:var(--bg4);color:var(--fg2);font-size:.75rem;padding:1px 7px;border-radius:10px;font-weight:600}
.col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* cards */
.card{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;cursor:grab;border:1px solid transparent;transition:all .15s;position:relative}
.card:hover{border-color:var(--bg4);box-shadow:var(--shadow)}
.card.dragging{opacity:.5;border-color:var(--accent)}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:4px;line-height:1.3}
.card-id{font-size:.7rem;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:6px}
.card-epic{font-size:.72rem;padding:2px 8px;border-radius:10px;font-weight:600;cursor:pointer}
.card-tag{font-size:.7rem;padding:1px 7px;border-radius:8px;font-weight:600;opacity:.85}
.card-priority{width:3px;height:100%;position:absolute;left:0;top:0;border-radius:var(--radius) 0 0 var(--radius)}
.priority-1{background:var(--blue)}
.priority-2{background:var(--green)}
.priority-3{background:var(--orange)}
.priority-4{background:var(--red)}
.card-comments{font-size:.75rem;color:var(--fg3);display:flex;align-items:center;gap:3px}
.card-todo{font-size:.72rem;color:var(--fg3);display:flex;align-items:center;gap:3px}
.card-link{font-size:.72rem;color:var(--accent2);display:flex;align-items:center;gap:2px}
.drop-zone{min-height:40px;border:2px dashed var(--bg4);border-radius:var(--radius);margin:4px 0;transition:all .15s}
.drop-zone.over{border-color:var(--accent);background:rgba(124,111,247,.08)}
.add-task-btn{width:100%;padding:8px;background:transparent;border:1px dashed var(--bg4);border-radius:var(--radius);color:var(--fg3);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .15s;margin-top:4px}
.add-task-btn:hover{border-color:var(--accent);color:var(--accent2)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--radius-lg);width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bg3)}
.modal-header h2{font-size:1rem}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--bg3)}

/* image lightbox */
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
.lightbox-overlay img{max-width:calc(100vw - 40px);max-height:calc(100vh - 40px);object-fit:contain;border-radius:var(--radius-lg);box-shadow:0 4px 30px rgba(0,0,0,.6)}

/* form elements */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8rem;color:var(--fg2);font-weight:600}
.field input,.field textarea,.field select{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:8px 10px;color:var(--fg);font-family:inherit;font-size:.88rem;outline:none;transition:border .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.field select{cursor:pointer}
.field-row{display:flex;gap:12px}
.field-row .field{flex:1}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:.78rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;opacity:.6}
.chip.selected{opacity:1;border-color:#fff3}
.chip:hover{opacity:.9}

/* markdown toolbar */
.md-toolbar{display:flex;gap:2px;padding:4px;background:var(--bg4);border-radius:var(--radius) var(--radius) 0 0;flex-wrap:wrap}
.md-toolbar button{background:transparent;border:none;color:var(--fg2);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:.78rem;font-family:'JetBrains Mono',monospace;font-weight:600;transition:all .1s}
.md-toolbar button:hover{background:var(--accent);color:#fff}
.md-toolbar+textarea{border-radius:0 0 var(--radius) var(--radius)!important}

/* markdown rendered content */
.md-content{font-size:.9rem;line-height:1.6;color:var(--fg2);padding:10px 14px;background:var(--bg3);border-radius:var(--radius);min-height:40px;overflow-wrap:break-word}
.md-content:empty::before{content:'Нет описания';color:var(--fg3)}
.md-content h1,.md-content h2,.md-content h3{color:var(--fg);margin:8px 0 4px;font-size:1rem}
.md-content h1{font-size:1.15rem}
.md-content h2{font-size:1.05rem}
.md-content p{margin:4px 0}
.md-content ul,.md-content ol{margin:4px 0 4px 20px}
.md-content li{margin:2px 0}
.md-content code{background:var(--bg4);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.82rem}
.md-content pre{background:var(--bg4);padding:10px;border-radius:var(--radius);overflow-x:auto;margin:6px 0}
.md-content pre code{background:none;padding:0}
.md-content img{max-width:100%;border-radius:var(--radius);margin:6px 0;cursor:zoom-in}
.md-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--fg3);margin:6px 0}
.md-content input[type="checkbox"]{margin-right:6px;accent-color:var(--accent);cursor:pointer}
.md-content a{color:var(--accent2)}

/* task detail page */
.task-page{max-width:800px;margin:0 auto;padding:30px 24px}
.task-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.task-page-header h2{font-size:1.3rem;display:flex;align-items:center;gap:10px}
.task-page-header .task-id-badge{font-size:.85rem;color:var(--fg3);font-family:'JetBrains Mono',monospace}
.task-page-body{display:flex;flex-direction:column;gap:16px}
.task-page-sidebar-info{display:flex;flex-wrap:wrap;gap:12px;padding:14px;background:var(--bg2);border-radius:var(--radius-lg);margin-bottom:8px}
.task-info-item{display:flex;flex-direction:column;gap:3px;min-width:120px}
.task-info-item label{font-size:.72rem;color:var(--fg3);text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.task-info-item .value{font-size:.88rem;color:var(--fg)}
.task-page-section{background:var(--bg2);border-radius:var(--radius-lg);padding:16px 20px}
.task-page-section h3{font-size:.9rem;margin-bottom:10px;color:var(--fg2)}
.task-dates{font-size:.72rem;color:var(--fg3);display:flex;gap:16px}

/* interactive todo list */
.todo-list{display:flex;flex-direction:column;gap:4px}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius);transition:all .15s}
.todo-item:hover{background:var(--bg4)}
.todo-item input[type="checkbox"]{accent-color:var(--accent);cursor:pointer;width:16px;height:16px;flex-shrink:0}
.todo-item .todo-text{flex:1;font-size:.88rem}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--fg3)}
.todo-item .btn-icon{opacity:0;transition:opacity .15s}
.todo-item:hover .btn-icon{opacity:1}
.todo-add{display:flex;gap:6px;margin-top:6px}
.todo-add input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 10px;color:var(--fg);font-family:inherit;font-size:.85rem;outline:none}
.todo-add input:focus{border-color:var(--accent)}

/* epic page */
.epic-page{max-width:900px;margin:0 auto;padding:30px 24px}
.epic-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.epic-page-header h2{font-size:1.3rem;display:flex;align-items:center;gap:10px}
.epic-task-list{display:flex;flex-direction:column;gap:6px}
.epic-task-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.epic-task-row:hover{background:var(--bg4)}
.epic-task-status{padding:2px 10px;border-radius:10px;font-size:.75rem;font-weight:600;background:var(--bg4);color:var(--fg2)}
.epic-task-title{flex:1;font-size:.9rem;font-weight:600}
.epic-task-prio{font-size:.75rem;font-weight:600}

/* search */
.search-input{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 10px;color:var(--fg);font-family:inherit;font-size:.85rem;outline:none;width:240px;transition:border .15s}
.search-input:focus{border-color:var(--accent);width:300px}
.search-results{position:fixed;top:52px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--bg4);padding:12px 24px;max-height:60vh;overflow-y:auto;box-shadow:var(--shadow)}
.search-result-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius);cursor:pointer;margin-bottom:4px;transition:all .15s}
.search-result-item:hover{background:var(--bg4)}

/* sidebar panel */
.sidebar{position:fixed;right:0;top:52px;width:360px;height:calc(100vh - 52px);background:var(--bg2);border-left:1px solid var(--bg4);z-index:150;transform:translateX(100%);transition:transform .25s;padding:20px;overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sidebar h3{font-size:.95rem;margin-bottom:12px}
.sidebar-section{margin-bottom:24px}
.entity-list{display:flex;flex-direction:column;gap:6px}
.entity-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.entity-item .dot{width:12px;height:12px;min-width:12px;min-height:12px;border-radius:50%;margin-right:8px;flex-shrink:0}
.entity-item span{flex:1;font-size:.85rem}
.entity-add{display:flex;gap:6px;margin-top:8px}
.entity-add input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:6px 8px;color:var(--fg);font-family:inherit;font-size:.82rem;outline:none}
.entity-add input[type="color"]{width:36px;padding:2px;cursor:pointer;flex:none}

/* column reorder controls */
.col-order-item{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius)}
.col-order-item span{flex:1;font-size:.85rem}
.col-order-btns{display:flex;gap:2px}
.col-order-btns button{background:transparent;border:none;color:var(--fg3);cursor:pointer;padding:2px 6px;border-radius:3px;font-size:.85rem}
.col-order-btns button:hover{background:var(--bg4);color:var(--fg)}

/* epic progress in sidebar */
.epic-progress{margin-top:4px}
.epic-progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}
.epic-progress-fill{height:100%;border-radius:2px;transition:width .3s}
.epic-progress-text{font-size:.7rem;color:var(--fg3)}

/* theme selector */
.theme-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.theme-btn{padding:6px 14px;border-radius:var(--radius);border:2px solid var(--bg4);background:var(--bg3);color:var(--fg);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}

/* font size control */
.font-size-ctrl{display:flex;align-items:center;gap:8px;margin-top:4px}
.font-size-ctrl button{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--bg4);background:var(--bg3);color:var(--fg);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.font-size-ctrl button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.font-size-ctrl span{font-size:.85rem;color:var(--fg2);min-width:40px;text-align:center}

/* project link display */
.project-link{display:inline-flex;align-items:center;gap:4px;font-size:.82rem;color:var(--accent2);padding:4px 10px;background:var(--bg3);border-radius:var(--radius);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* comment form */
.comment-form{display:flex;flex-direction:column;gap:8px}
.comment-form textarea{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:8px 10px;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:.82rem;outline:none;resize:vertical;min-height:60px}
.comment-form textarea:focus{border-color:var(--accent)}
.comment-form-actions{display:flex;justify-content:space-between;align-items:center}
.paste-hint{font-size:.72rem;color:var(--fg3)}
.comments-list{display:flex;flex-direction:column;gap:8px}
.comment{background:var(--bg3);border-radius:var(--radius);padding:10px 12px}
.comment-text{font-size:.88rem;line-height:1.5}
.comment-text .md-content{padding:0;background:none;min-height:auto}
.comment-time{font-size:.72rem;color:var(--fg3);margin-top:4px;display:flex;justify-content:space-between;align-items:center}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="header">
  <h1><a href="/" onclick="navigateTo('/');return false;">&#x2B21; kanban</a></h1>
  <div class="header-actions">
    <input class="search-input" id="search" placeholder="Поиск (plaintext / regex)..." autocomplete="off">
    <button class="btn btn-ghost btn-sm" onclick="toggleSidebar()">&#9881; Настройки</button>
  </div>
</div>
<div class="header-spacer"></div>

<div id="search-results" class="search-results hidden"></div>

<div id="app"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <h3>Тема оформления</h3>
    <div class="theme-list" id="theme-list">
      <button class="theme-btn" data-theme="dark" onclick="setTheme('dark')">Тёмная</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Светлая</button>
      <button class="theme-btn" data-theme="ocean" onclick="setTheme('ocean')">Океан</button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest')">Лес</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Размер шрифта</h3>
    <div class="font-size-ctrl">
      <button onclick="changeFontSize(-1)">-</button>
      <span id="font-size-label">14px</span>
      <button onclick="changeFontSize(1)">+</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Колонки</h3>
    <div class="entity-list" id="col-order-list"></div>
    <div class="entity-add" style="margin-top:8px">
      <input type="text" id="new-col-name" placeholder="Новая колонка..." onkeydown="if(event.key==='Enter')addColumn()">
      <button class="btn btn-primary btn-sm" onclick="addColumn()">+</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Эпики</h3>
    <div class="entity-list" id="epic-list"></div>
    <div class="entity-add">
      <input type="color" id="epic-color" value="#6366f1">
      <input type="text" id="epic-name" placeholder="Новый эпик..." onkeydown="if(event.key==='Enter')addEpic()">
      <button class="btn btn-primary btn-sm" onclick="addEpic()">+</button>
    </div>
  </div>
  <div class="sidebar-section">
    <h3>Теги</h3>
    <div class="entity-list" id="tag-list"></div>
    <div class="entity-add">
      <input type="color" id="tag-color" value="#64748b">
      <input type="text" id="tag-name" placeholder="Новый тег..." onkeydown="if(event.key==='Enter')addTag()">
      <button class="btn btn-primary btn-sm" onclick="addTag()">+</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let state = { columns: [], tasks: [], epics: [], tags: [] };
let draggedTaskId = null;
let searchQuery = '';
let searchMatchIds = null; // null = no search active, Set = matched task IDs
let currentView = 'board';
let currentTaskId = null;
let currentEpicId = null;
let searchTimeout = null;

// --- Theme ---
function setTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  localStorage.setItem('kanban-theme', name);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === name);
  });
}
(function initTheme() {
  setTheme(localStorage.getItem('kanban-theme') || 'dark');
})();

// --- Font size ---
function getFontSize() {
  return parseInt(localStorage.getItem('kanban-font-size') || '14');
}
function setFontSize(px) {
  px = Math.max(10, Math.min(22, px));
  localStorage.setItem('kanban-font-size', px);
  document.documentElement.style.setProperty('--font-size', px + 'px');
  const label = document.getElementById('font-size-label');
  if (label) label.textContent = px + 'px';
}
function changeFontSize(delta) { setFontSize(getFontSize() + delta); }
(function initFontSize() { setFontSize(getFontSize()); })();

// --- Contrast color util ---
function contrastColor(hex) {
  if (!hex || hex[0] !== '#') return '#fff';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55 ? '#1a1a2e' : '#ffffff';
}

// --- Markdown setup ---
function initMarked() {
  if (typeof marked === 'undefined') return;
  marked.setOptions({ breaks: true, gfm: true });
}
initMarked();

function renderMd(text) {
  if (!text) return '';
  if (typeof marked === 'undefined') return esc(text);
  try { return marked.parse(text); } catch { return esc(text); }
}

function countTodos(text) {
  if (!text) return null;
  const all = (text.match(/- \[[ x]\]/gi) || []);
  if (all.length === 0) return null;
  const done = (text.match(/- \[x\]/gi) || []).length;
  return { done, total: all.length };
}

function parseTodoItems(text) {
  if (!text) return [];
  return text.split('\n').filter(l => /^- \[[ x]\]/i.test(l.trim())).map(l => {
    const done = /^- \[x\]/i.test(l.trim());
    const label = l.trim().replace(/^- \[[ x]\]\s*/i, '');
    return { done, label };
  });
}

function todoItemsToText(items) {
  return items.map(i => `- [${i.done ? 'x' : ' '}] ${i.label}`).join('\n');
}

// --- Epic progress ---
function epicProgress(epicId) {
  const epicTasks = state.tasks.filter(t => t.epic_id === epicId);
  if (epicTasks.length === 0) return { total: 0, done: 0, pct: 0 };
  const lastCol = state.columns.length ? state.columns[state.columns.length - 1] : null;
  const done = lastCol ? epicTasks.filter(t => t.column_id === lastCol.id).length : 0;
  return { total: epicTasks.length, done, pct: Math.round(done / epicTasks.length * 100) };
}

// --- API helpers ---
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadBoard() {
  state = await api('/api/board');
  if (!state.columns) state.columns = [];
  if (!state.tasks) state.tasks = [];
  if (!state.epics) state.epics = [];
  if (!state.tags) state.tags = [];
  renderCurrentView();
}

// --- Image paste ---
async function uploadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      const base64 = reader.result.split(',')[1];
      try {
        const res = await api('/api/images', 'POST', { data: base64, mime: file.type });
        resolve(res.url);
      } catch (e) { reject(e); }
    };
    reader.readAsDataURL(file);
  });
}

function setupPaste(textarea) {
  textarea.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        const pos = textarea.selectionStart;
        const before = textarea.value.substring(0, pos);
        const after = textarea.value.substring(textarea.selectionEnd);
        textarea.value = before + '![Загрузка...]()' + after;
        try {
          const url = await uploadImage(file);
          textarea.value = before + `![image](${url})` + after;
        } catch {
          textarea.value = before + '![Ошибка загрузки]()' + after;
        }
        break;
      }
    }
  });
}

// --- Image lightbox ---
function openLightbox(src) {
  const overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `<img src="${src}" alt="">`;
  document.body.appendChild(overlay);
  document.addEventListener('keydown', function handler(e) {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
  });
}

// Delegate image clicks in md-content
document.addEventListener('click', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.md-content')) {
    e.preventDefault();
    openLightbox(e.target.src);
  }
});

// --- Markdown toolbar ---
function insertMdToolbar(textareaId) {
  return `<div class="md-toolbar">
    <button type="button" onclick="mdInsert('${textareaId}','**','**')" title="Жирный"><b>B</b></button>
    <button type="button" onclick="mdInsert('${textareaId}','*','*')" title="Курсив"><i>I</i></button>
    <button type="button" onclick="mdInsert('${textareaId}','~~','~~')" title="Зачёркнутый"><s>S</s></button>
    <button type="button" onclick="mdInsert('${textareaId}','## ','')" title="Заголовок">H</button>
    <button type="button" onclick="mdInsert('${textareaId}','\\n- ','')" title="Список">&#8226;</button>
    <button type="button" onclick="mdInsert('${textareaId}','\\n- [ ] ','')" title="TODO">&#9745;</button>
    <button type="button" onclick="mdInsert('${textareaId}','[','](url)')" title="Ссылка">&#128279;</button>
    <button type="button" onclick="mdInsert('${textareaId}','\\n\`\`\`\\n','\\n\`\`\`\\n')" title="Код">&lt;/&gt;</button>
    <button type="button" onclick="mdInsert('${textareaId}','> ','')" title="Цитата">&#10077;</button>
  </div>`;
}

function mdInsert(id, before, after) {
  const ta = document.getElementById(id);
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  const b = before.replace(/\\n/g, '\n');
  const a = after.replace(/\\n/g, '\n');
  ta.value = ta.value.substring(0, start) + b + sel + a + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + b.length;
  ta.selectionEnd = start + b.length + sel.length;
}

// --- Router ---
function navigateTo(path) {
  history.pushState(null, '', path);
  route();
}

function route() {
  const path = location.pathname;
  const taskMatch = path.match(/^\/task\/(\d+)$/);
  const epicMatch = path.match(/^\/epic\/(\d+)$/);
  if (taskMatch) {
    currentView = 'task';
    currentTaskId = Number(taskMatch[1]);
    currentEpicId = null;
  } else if (epicMatch) {
    currentView = 'epic';
    currentEpicId = Number(epicMatch[1]);
    currentTaskId = null;
  } else {
    currentView = 'board';
    currentTaskId = null;
    currentEpicId = null;
  }
  renderCurrentView();
}

window.addEventListener('popstate', route);

function renderCurrentView() {
  if (currentView === 'task' && currentTaskId) {
    renderTaskPage(currentTaskId);
  } else if (currentView === 'epic' && currentEpicId) {
    renderEpicPage(currentEpicId);
  } else {
    renderBoard();
  }
  renderSidebar();
}

// --- Render Board ---
function renderBoard() {
  const app = document.getElementById('app');
  const filtered = filterTasks(state.tasks);

  let html = '<div class="board">';
  for (const col of state.columns) {
    const colTasks = filtered.filter(t => t.column_id === col.id);
    html += `<div class="column">
      <div class="col-header">
        <span class="col-title">${esc(col.name)} <span class="col-count">${colTasks.length}</span></span>
      </div>
      <div class="col-body" data-col="${col.id}"
        ondragover="onDragOver(event)" ondrop="onDrop(event, ${col.id})" ondragleave="onDragLeave(event)">
        ${colTasks.map(t => renderCard(t)).join('')}
        <button class="add-task-btn" onclick="openCreateTask(${col.id})">+ Добавить задачу</button>
      </div></div>`;
  }
  html += '</div>';
  app.innerHTML = html;
}

function renderCard(t) {
  const prioClass = t.priority > 0 ? `<div class="card-priority priority-${t.priority}"></div>` : '';
  const epicColor = t.epic ? esc(t.epic.color) : '';
  const epicTextColor = t.epic ? contrastColor(t.epic.color) : '';
  const epic = t.epic ? `<span class="card-epic" style="background:${epicColor};color:${epicTextColor}" onclick="event.stopPropagation();navigateTo('/epic/${t.epic.id}')">${esc(t.epic.name)}</span>` : '';
  const tags = (t.tags || []).map(tg => {
    const tc = contrastColor(tg.color);
    return `<span class="card-tag" style="background:${esc(tg.color)};color:${tc}">${esc(tg.name)}</span>`;
  }).join('');
  const comments = t.comments && t.comments.length ? `<span class="card-comments">&#128172; ${t.comments.length}</span>` : '';
  const todos = countTodos(t.todo);
  const todoHtml = todos ? `<span class="card-todo">&#9745; ${todos.done}/${todos.total}</span>` : '';
  const linkHtml = t.project_url ? `<span class="card-link">&#128279;</span>` : '';
  return `<div class="card" draggable="true" ondragstart="onDragStart(event,${t.id})" ondragend="onDragEnd(event)" onclick="navigateTo('/task/${t.id}')">
    ${prioClass}
    <div class="card-title">${esc(t.title)} <span class="card-id">#${t.id}</span></div>
    <div class="card-meta">${epic}${tags}${todoHtml}${linkHtml}${comments}</div>
  </div>`;
}

// --- Interactive TODO ---
async function toggleTodoItem(taskId, index, checked) {
  const t = await api(`/api/tasks/${taskId}`);
  const items = parseTodoItems(t.todo);
  if (index >= 0 && index < items.length) {
    items[index].done = checked;
  }
  await api(`/api/tasks/${taskId}`, 'PUT', {
    title: t.title, description: t.description, todo: todoItemsToText(items),
    project_url: t.project_url, column_id: t.column_id, epic_id: t.epic_id,
    priority: t.priority, tag_ids: (t.tags||[]).map(tg => tg.id)
  });
  await loadBoard();
}

async function removeTodoItem(taskId, index) {
  const t = await api(`/api/tasks/${taskId}`);
  const items = parseTodoItems(t.todo);
  items.splice(index, 1);
  await api(`/api/tasks/${taskId}`, 'PUT', {
    title: t.title, description: t.description, todo: todoItemsToText(items),
    project_url: t.project_url, column_id: t.column_id, epic_id: t.epic_id,
    priority: t.priority, tag_ids: (t.tags||[]).map(tg => tg.id)
  });
  await loadBoard();
}

async function addTodoItem(taskId) {
  const input = document.getElementById('todo-new-input');
  const label = input.value.trim();
  if (!label) return;
  const t = await api(`/api/tasks/${taskId}`);
  const items = parseTodoItems(t.todo);
  items.push({ done: false, label });
  await api(`/api/tasks/${taskId}`, 'PUT', {
    title: t.title, description: t.description, todo: todoItemsToText(items),
    project_url: t.project_url, column_id: t.column_id, epic_id: t.epic_id,
    priority: t.priority, tag_ids: (t.tags||[]).map(tg => tg.id)
  });
  await loadBoard();
}

async function addCommentFromPage(taskId) {
  const ta = document.getElementById('m-comment');
  const text = ta.value.trim();
  if (!text) return;
  await api('/api/comments', 'POST', { task_id: taskId, text });
  await loadBoard();
}

async function deleteCommentFromPage(commentId, taskId) {
  await api(`/api/comments/${commentId}`, 'DELETE');
  await loadBoard();
}

async function deleteTaskFromPage(id) {
  if (!confirm('Удалить задачу?')) return;
  await api(`/api/tasks/${id}`, 'DELETE');
  navigateTo('/');
  await loadBoard();
}

  document.getElementById('col-order-list').innerHTML = state.columns.map((c, i) =>
    `<div class="col-order-item" data-id="${c.id}">
      <span>${esc(c.name)}</span>
      <div class="col-order-btns">
        <button onclick="event.stopPropagation();moveColumnUp(${i})" ${i===0?'disabled':''} title="Вверх">&#9650;</button>
        <button onclick="event.stopPropagation();moveColumnDown(${i})" ${i===state.columns.length-1?'disabled':''} title="Вниз">&#9660;</button>
        <button onclick="event.stopPropagation();deleteColumn(${c.id})" title="Удалить" style="color:var(--red)">&#10005;</button>
      </div>
    </div>`).join('');

  // Epics with progress
  document.getElementById('epic-list').innerHTML = state.epics.map(e => {
    const p = epicProgress(e.id);
    return `<div class="entity-item" style="flex-wrap:wrap;cursor:pointer" onclick="navigateTo('/epic/${e.id}')">
      <span class="dot" style="background:${esc(e.color)}"></span>
      <span>${esc(e.name)}</span>
      <button class="btn-icon" onclick="event.stopPropagation();deleteEpic(${e.id})">&#10005;</button>
      ${p.total > 0 ? `<div class="epic-progress" style="width:100%">
        <div class="epic-progress-text">${p.done}/${p.total} задач (${p.pct}%)</div>
        <div class="epic-progress-bar"><div class="epic-progress-fill" style="width:${p.pct}%;background:${esc(e.color)}"></div></div>
      </div>` : ''}
    </div>`;
  }).join('');

  // Tags
  document.getElementById('tag-list').innerHTML = state.tags.map(t =>
    `<div class="entity-item">
      <span class="dot" style="background:${esc(t.color)}"></span>
      <span>${esc(t.name)}</span>
      <button class="btn-icon" onclick="event.stopPropagation();deleteTag(${t.id})">&#10005;</button>
    </div>`).join('');
}

function filterTasks(tasks) {
  if (!searchMatchIds) return tasks;
  return tasks.filter(t => searchMatchIds.has(t.id));
}

// --- Search ---
async function performSearch(query) {
  if (!query) {
    searchMatchIds = null;
    document.getElementById('search-results').classList.add('hidden');
    if (currentView === 'board') renderBoard();
    return;
  }

  // Validate regex if it looks like one
  let isRegex = false;
  try {
    new RegExp(query);
    isRegex = true;
  } catch {
    // invalid regex, use as plain text
  }

  try {
    const res = await api(`/api/search?q=${encodeURIComponent(query)}${isRegex?'&regex=1':''}`);
    const ids = res.task_ids || [];
    searchMatchIds = new Set(ids);

    // Show search results dropdown
    const container = document.getElementById('search-results');
    if (ids.length === 0) {
      container.innerHTML = '<div style="color:var(--fg3);font-size:.85rem">Ничего не найдено</div>';
      container.classList.remove('hidden');
    } else {
      const matchedTasks = state.tasks.filter(t => searchMatchIds.has(t.id));
      container.innerHTML = matchedTasks.slice(0, 20).map(t => {
        const col = state.columns.find(c => c.id === t.column_id);
        const epicBadge = t.epic ? `<span class="card-epic" style="background:${esc(t.epic.color)};color:${contrastColor(t.epic.color)};font-size:.7rem">${esc(t.epic.name)}</span>` : '';
        return `<div class="search-result-item" onclick="closeSearch();navigateTo('/task/${t.id}')">
          <span class="card-id">#${t.id}</span>
          <span style="flex:1;font-weight:600">${esc(t.title)}</span>
          ${epicBadge}
          <span style="color:var(--fg3);font-size:.78rem">${esc(col?.name||'')}</span>
        </div>`;
      }).join('') + (ids.length > 20 ? `<div style="color:var(--fg3);font-size:.8rem;padding:4px">...и ещё ${ids.length - 20}</div>` : '');
      container.classList.remove('hidden');
    }

    if (currentView === 'board') renderBoard();
  } catch (e) {
    const container = document.getElementById('search-results');
    container.innerHTML = `<div style="color:var(--red);font-size:.85rem">Ошибка: ${esc(e.message)}</div>`;
    container.classList.remove('hidden');
  }
}

function closeSearch() {
  searchMatchIds = null;
  document.getElementById('search-results').classList.add('hidden');
  document.getElementById('search').value = '';
  if (currentView === 'board') renderBoard();
}

// --- Column reorder ---
async function moveColumnUp(index) {
  if (index <= 0) return;
  const ids = state.columns.map(c => c.id);
  [ids[index - 1], ids[index]] = [ids[index], ids[index - 1]];
  await api('/api/columns/reorder', 'POST', { ids });
  await loadBoard();
}
async function moveColumnDown(index) {
  if (index >= state.columns.length - 1) return;
  const ids = state.columns.map(c => c.id);
  [ids[index], ids[index + 1]] = [ids[index + 1], ids[index]];
  await api('/api/columns/reorder', 'POST', { ids });
  await loadBoard();
}

// --- Drag & Drop ---
function onDragStart(e, taskId) {
  draggedTaskId = taskId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.target.classList.remove('dragging');
  draggedTaskId = null;
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('over'));
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('over'); }
async function onDrop(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if (!draggedTaskId) return;
  await api('/api/tasks/move', 'POST', { task_id: draggedTaskId, column_id: colId, position: 0 });
  await loadBoard();
}

// --- Modals ---
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('textarea').forEach(setupPaste);
  const first = overlay.querySelector('input,textarea,select');
  if (first) first.focus();
  return overlay;
}
function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function openCreateTask(colId) {
  const epicOpts = state.epics.map(e => `<option value="${e.id}">${esc(e.name)}</option>`).join('');
  const tagChips = state.tags.map(t => {
    const tc = contrastColor(t.color);
    return `<span class="chip" data-id="${t.id}" style="background:${esc(t.color)};color:${tc}" onclick="this.classList.toggle('selected')">${esc(t.name)}</span>`;
  }).join('');
  const colOpts = state.columns.map(c => `<option value="${c.id}" ${c.id===colId?'selected':''}>${esc(c.name)}</option>`).join('');
  showModal(`
    <div class="modal-header"><h2>Новая задача</h2><button class="btn-icon" onclick="closeModal()">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><label>Название</label><input id="m-title"></div>
      <div class="field">
        <label>Описание <span class="paste-hint">(markdown, вставка картинок)</span></label>
        ${insertMdToolbar('m-desc')}
        <textarea id="m-desc" placeholder="Markdown: **жирный**, ![alt](url)"></textarea>
      </div>
      <div class="field">
        <label>Ссылка на проект</label>
        <input id="m-url" placeholder="https://github.com/...">
      </div>
      <div class="field-row">
        <div class="field"><label>Колонка</label><select id="m-col">${colOpts}</select></div>
        <div class="field"><label>Приоритет</label>
          <select id="m-prio"><option value="0">—</option><option value="1">Низкий</option><option value="2">Средний</option><option value="3">Высокий</option><option value="4">Критический</option></select>
        </div>
      </div>
      <div class="field"><label>Эпик</label><select id="m-epic"><option value="">—</option>${epicOpts}</select></div>
      <div class="field"><label>Теги</label><div class="checkbox-group" id="m-tags">${tagChips}</div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="submitCreateTask()">Создать</button>
    </div>`);
}

async function submitCreateTask() {
  const title = document.getElementById('m-title').value.trim();
  if (!title) return;
  const tagIds = [...document.querySelectorAll('#m-tags .chip.selected')].map(c => Number(c.dataset.id));
  const epicVal = document.getElementById('m-epic').value;
  await api('/api/tasks', 'POST', {
    title, description: document.getElementById('m-desc').value,
    todo: '',
    project_url: document.getElementById('m-url').value.trim(),
    column_id: Number(document.getElementById('m-col').value),
    priority: Number(document.getElementById('m-prio').value),
    epic_id: epicVal ? Number(epicVal) : null, tag_ids: tagIds
  });
  closeModal();
  await loadBoard();
}

// Edit task modal
async function openEditTask(taskId) {
  const t = await api(`/api/tasks/${taskId}`);
  const epicOpts = state.epics.map(e => `<option value="${e.id}" ${t.epic_id===e.id?'selected':''}>${esc(e.name)}</option>`).join('');
  const colOpts = state.columns.map(c => `<option value="${c.id}" ${t.column_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  const tagChips = state.tags.map(tg => {
    const sel = (t.tags||[]).some(x=>x.id===tg.id)?'selected':'';
    const tc = contrastColor(tg.color);
    return `<span class="chip ${sel}" data-id="${tg.id}" style="background:${esc(tg.color)};color:${tc}" onclick="this.classList.toggle('selected')">${esc(tg.name)}</span>`;
  }).join('');

  showModal(`
    <div class="modal-header"><h2>Редактировать #${t.id}</h2><button class="btn-icon" onclick="closeModal()">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><label>Название</label><input id="m-title" value="${escAttr(t.title)}"></div>
      <div class="field">
        <label>Описание <span class="paste-hint">(markdown, вставка картинок)</span></label>
        ${insertMdToolbar('m-desc')}
        <textarea id="m-desc">${esc(t.description)}</textarea>
      </div>
      <div class="field">
        <label>Ссылка на проект</label>
        <input id="m-url" value="${escAttr(t.project_url)}">
      </div>
      <div class="field-row">
        <div class="field"><label>Колонка</label><select id="m-col">${colOpts}</select></div>
        <div class="field"><label>Приоритет</label>
          <select id="m-prio">
            <option value="0" ${t.priority===0?'selected':''}>—</option>
            <option value="1" ${t.priority===1?'selected':''}>Низкий</option>
            <option value="2" ${t.priority===2?'selected':''}>Средний</option>
            <option value="3" ${t.priority===3?'selected':''}>Высокий</option>
            <option value="4" ${t.priority===4?'selected':''}>Критический</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Эпик</label><select id="m-epic"><option value="">—</option>${epicOpts}</select></div>
      <div class="field"><label>Теги</label><div class="checkbox-group" id="m-tags">${tagChips}</div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="submitUpdateTask(${t.id})">Сохранить</button>
    </div>`);
}

async function submitUpdateTask(id) {
  const tagIds = [...document.querySelectorAll('#m-tags .chip.selected')].map(c => Number(c.dataset.id));
  const epicVal = document.getElementById('m-epic').value;
  // Preserve existing todo (edit only changes desc, not todo)
  const existing = await api(`/api/tasks/${id}`);
  await api(`/api/tasks/${id}`, 'PUT', {
    title: document.getElementById('m-title').value.trim(),
    description: document.getElementById('m-desc').value,
    todo: existing.todo || '',
    project_url: document.getElementById('m-url').value.trim(),
    column_id: Number(document.getElementById('m-col').value),
    priority: Number(document.getElementById('m-prio').value),
    epic_id: epicVal ? Number(epicVal) : null, tag_ids: tagIds
  });
  closeModal();
  await loadBoard();
}

// --- Columns ---
async function addColumn() {
  const input = document.getElementById('new-col-name');
  const name = input.value.trim();
  if (!name) return;
  await api('/api/columns', 'POST', { Name: name });
  input.value = '';
  await loadBoard();
}
async function deleteColumn(id) {
  const col = state.columns.find(c => c.id === id);
  const tasks = state.tasks.filter(t => t.column_id === id);
  if (tasks.length > 0) { alert('Сначала переместите задачи из колонки'); return; }
  if (!confirm(`Удалить колонку "${col?.name}"?`)) return;
  await api(`/api/columns/${id}`, 'DELETE');
  await loadBoard();
}

// --- Epics / Tags ---
async function addEpic() {
  const name = document.getElementById('epic-name').value.trim();
  if (!name) return;
  const color = document.getElementById('epic-color').value;
  await api('/api/epics', 'POST', { Name: name, Color: color });
  document.getElementById('epic-name').value = '';
  await loadBoard();
}
async function deleteEpic(id) { await api(`/api/epics/${id}`, 'DELETE'); await loadBoard(); }
async function addTag() {
  const name = document.getElementById('tag-name').value.trim();
  if (!name) return;
  const color = document.getElementById('tag-color').value;
  await api('/api/tags', 'POST', { Name: name, Color: color });
  document.getElementById('tag-name').value = '';
  await loadBoard();
}
async function deleteTag(id) { await api(`/api/tags/${id}`, 'DELETE'); await loadBoard(); }

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// --- Search input ---
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim();
  clearTimeout(searchTimeout);
  if (!q) {
    performSearch('');
    return;
  }
  searchTimeout = setTimeout(() => performSearch(q), 300);
});

// Close search on Escape
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSearch();
    e.target.blur();
  }
});

// Close search results on click outside
document.addEventListener('click', e => {
  if (!e.target.closest('#search-results') && !e.target.closest('#search')) {
    const sr = document.getElementById('search-results');
    if (!sr.classList.contains('hidden')) {
      sr.classList.add('hidden');
    }
  }
});

// --- Helpers ---
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return esc(s); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
}

// --- Init ---
loadBoard().then(() => route());
</script>
